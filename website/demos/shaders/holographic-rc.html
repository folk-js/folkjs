<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic Radiance Cascade</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        background: #111;
        font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.6);
      }
      #canvas-area {
        flex: 1;
        position: relative;
        min-height: 0;
        overflow: hidden;
      }
      folk-shape {
        position: absolute;
        background-color: transparent;
      }
      folk-holographic-rc {
        overflow: hidden;
      }

      /* ── Bottom bar ── */
      #bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 5px 12px;
        background: #0a0a0a;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
        z-index: 1000;
        container: bar / inline-size;
      }
      #bar select {
        font: inherit;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        padding: 2px 6px;
        cursor: pointer;
        outline: none;
      }
      #bar .g {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      #bar input[type='range'] {
        width: 72px;
      }
      #bar label {
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      #bar .v {
        width: 28px;
        text-align: right;
        color: rgba(255, 255, 255, 0.4);
      }
      .spacer {
        flex: 1;
      }
      #fps {
        color: rgba(255, 255, 255, 0.4);
        white-space: nowrap;
      }
      #info-btn {
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: rgba(255, 255, 255, 0.35);
        cursor: pointer;
        font: inherit;
        font-size: 10px;
        font-weight: bold;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        line-height: 1;
        flex-shrink: 0;
      }
      #info-btn:hover {
        color: rgba(255, 255, 255, 0.7);
        border-color: rgba(255, 255, 255, 0.3);
      }
      #info-popup {
        position: fixed;
        bottom: 36px;
        right: 40px;
        z-index: 1002;
        background: rgba(10, 10, 10, 0.92);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 12px 14px;
        display: none;
        min-width: 180px;
        font-size: 11px;
        line-height: 1.7;
      }
      #info-popup.open {
        display: block;
      }
      #info-popup kbd {
        display: inline-block;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 3px;
        padding: 0 4px;
        margin-right: 2px;
        font: inherit;
        font-size: 10px;
      }
      #info-popup .row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
      }
      #info-popup .row span:last-child {
        color: rgba(255, 255, 255, 0.35);
      }
      #ramp-legend {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }
      .ramp-title {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 5px;
      }
      .ramp-bar {
        height: 10px;
        border-radius: 3px;
        background: linear-gradient(to right,
          #000000,
          #0d004d 11.1%,
          #0033ff 22.2%,
          #00e6e6 33.3%,
          #1ae61a 44.4%,
          #fff21a 55.6%,
          #ff8000 66.7%,
          #ff0000 77.8%,
          #ff80cc 88.9%,
          #ffffff
        );
      }
      .ramp-labels {
        display: flex;
        justify-content: space-between;
        font-size: 8px;
        color: rgba(255, 255, 255, 0.35);
        margin-top: 2px;
      }
      #fps {
        cursor: pointer;
        text-decoration: underline;
        text-decoration-style: dotted;
        text-underline-offset: 2px;
      }
      #fps:hover {
        color: rgba(255, 255, 255, 0.6);
      }
      #perf-graph {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 1003;
        background: rgba(0, 0, 0, 0.8);
        border-radius: 6px;
        padding: 0;
        display: none;
        flex-direction: column;
        font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.5);
        pointer-events: none;
        overflow: hidden;
      }
      #perf-graph.open {
        display: flex;
      }
      #perf-graph .perf-stats {
        display: flex;
        gap: 12px;
        padding: 6px 8px 4px;
        font-size: 10px;
      }
      #color-btn {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: border-color 0.1s;
      }
      #color-btn:hover {
        border-color: rgba(255, 255, 255, 0.5);
      }
      #color-btn.open {
        border-color: rgba(255, 255, 255, 0.7);
      }
      #load-btn,
      #save-btn,
      #fs-btn {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.35);
        cursor: pointer;
        font-size: 14px;
        padding: 0 2px;
        line-height: 1;
      }
      #load-btn:hover,
      #save-btn:hover,
      #fs-btn:hover {
        color: rgba(255, 255, 255, 0.7);
      }

      /* ── Inspector panel (above bar) ── */
      #panel {
        position: fixed;
        bottom: 36px;
        right: 8px;
        z-index: 1001;
        background: rgba(10, 10, 10, 0.88);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 10px 12px 8px;
        min-width: 175px;
        user-select: none;
        display: none;
      }
      #panel.open {
        display: block;
      }
      #panel-title {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 8px;
      }
      #swatches {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .sw {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: border-color 0.1s;
      }
      .sw:hover {
        border-color: rgba(255, 255, 255, 0.4);
      }
      .sw.active {
        border-color: rgba(255, 255, 255, 0.8);
      }
      .sw.eraser {
        background: repeating-conic-gradient(#555 0% 25%, #888 0% 50%) 50% / 8px 8px;
      }
      #custom-color {
        width: 18px;
        height: 16px;
        border: none;
        padding: 0;
        cursor: pointer;
        background: none;
        border-radius: 4px;
      }
      #custom-color::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      #custom-color::-webkit-color-swatch {
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      .prow {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 20px;
      }
      .prow label {
        width: 48px;
        color: rgba(255, 255, 255, 0.45);
        flex-shrink: 0;
        font-size: 10px;
      }
      .prow input[type='range'] {
        flex: 1;
        min-width: 50px;
      }
      .prow .v {
        width: 28px;
        text-align: right;
        color: rgba(255, 255, 255, 0.4);
        font-size: 10px;
        flex-shrink: 0;
      }

      /* ── Slider styling ── */
      input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        height: 20px;
        background: transparent;
        outline: none;
        cursor: pointer;
      }
      input[type='range']::-webkit-slider-runnable-track {
        height: 3px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 2px;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        border: none;
        cursor: pointer;
        margin-top: -4.5px;
      }
      input[type='range']::-webkit-slider-thumb:hover {
        background: rgba(255, 255, 255, 0.75);
        transform: scale(1.2);
      }
      input[type='range']::-moz-range-thumb {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        border: none;
        cursor: pointer;
      }
      input[type='range']::-moz-range-thumb:hover {
        background: rgba(255, 255, 255, 0.75);
        transform: scale(1.2);
      }
      input[type='range']::-moz-range-track {
        height: 3px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 2px;
        border: none;
      }
    </style>
  </head>
  <body>
    <div id="canvas-area">
      <folk-holographic-rc id="hrc"></folk-holographic-rc>
    </div>

    <div id="bar">
      <select id="scene-select"></select>
      <select id="sky-select">
        <option value="none">sky: none</option>
        <option value="overcast">sky: overcast</option>
        <option value="spectrum">sky: spectrum</option>
        <option value="iridescent">sky: iridescent</option>
        <option value="studio">sky: studio</option>
        <option value="rgb">sky: RGB</option>
        <option value="sunset">sky: sunset</option>
        <option value="moonlight">sky: moonlight</option>
      </select>
      <div class="g">
        <label>exposure</label>
        <input id="exposure-slider" type="range" min="0.1" max="10" step="0.5" value="2" />
        <span class="v" id="exposure-value">2.0</span>
      </div>
      <div class="g">
        <label>probes</label>
        <input id="probe-slider" type="range" min="0" max="26" step="1" value="15" />
        <span class="v" id="probe-value">1024</span>
      </div>
      <label><input id="bounces-toggle" type="checkbox" checked /> bounces</label>
      <label><input id="pp-toggle" type="checkbox" /> 1px</label>
      <select id="debug-select">
        <option value="0">debug: off</option>
        <option value="1">debug: false color</option>
        <option value="2">debug: path trace</option>
        <option value="3">debug: PT vs HRC diff</option>
      </select>
      <div class="spacer"></div>
      <span id="rmse-display" style="color: rgba(255,255,255,0.4); white-space: nowrap; display: none;"></span>
      <span id="fps" title="Toggle perf graph"></span>
      <div id="color-btn" title="Material inspector"></div>
      <input id="scene-file" type="file" accept=".png" style="display:none" />
      <button id="load-btn" title="Load scene PNG">📂</button>
      <button id="save-btn" title="Save scene as PNG">💾</button>
      <button id="info-btn" title="Keyboard shortcuts">?</button>
      <button id="fs-btn" title="Fullscreen">⛶</button>
    </div>

    <div id="info-popup">
      <div class="row"
        ><span><kbd>←</kbd> <kbd>→</kbd></span
        ><span>prev / next scene</span></div
      >
      <div class="row"
        ><span><kbd>0</kbd>–<kbd>9</kbd></span
        ><span>pen color</span></div
      >
      <div class="row"
        ><span><kbd>+</kbd> <kbd>−</kbd></span
        ><span>pen size</span></div
      >
      <div class="row"
        ><span><kbd>N</kbd></span
        ><span>new shape</span></div
      >
      <div class="row"
        ><span><kbd>⌫</kbd></span
        ><span>delete shape</span></div
      >
      <div class="row"
        ><span><kbd>C</kbd></span
        ><span>clear drawing</span></div
      >
      <div class="row"
        ><span><kbd>S</kbd></span
        ><span>screenshot</span></div
      >
      <div class="row"
        ><span><kbd>F</kbd></span
        ><span>fullscreen</span></div
      >
      <div id="ramp-legend">
        <div class="ramp-title">false color / diff error (linear radiance)</div>
        <div class="ramp-bar"></div>
        <div class="ramp-labels">
          <span>0</span>
          <span>.0002</span>
          <span>.0007</span>
          <span>.002</span>
          <span>.006</span>
          <span>.017</span>
          <span>.046</span>
          <span>.13</span>
          <span>.36</span>
          <span>1+</span>
        </div>
      </div>
    </div>

    <div id="perf-graph">
      <div class="perf-stats">
        <span id="perf-fps" style="color: rgba(255, 255, 255, 0.7)"></span>
        <span id="perf-cpu-val" style="color: rgba(100, 200, 255, 0.9)"></span>
        <span id="perf-gpu-val" style="color: rgba(255, 150, 80, 0.9)"></span>
      </div>
      <canvas id="perf-canvas"></canvas>
    </div>

    <div id="panel">
      <div id="panel-title">Pen</div>
      <div id="swatches"><input type="color" id="custom-color" value="#cccccc" /></div>
      <div class="prow"
        ><label>opacity</label><input id="p-opacity" type="range" min="0" max="1" step="0.01" value="1" /><span
          class="v"
          id="v-opacity"
          >1.00</span
        ></div
      >
      <div class="prow"
        ><label>albedo</label><input id="p-albedo" type="range" min="0" max="1" step="0.01" value="0" /><span
          class="v"
          id="v-albedo"
          >0.00</span
        ></div
      >
      <div class="prow" id="size-row"
        ><label>size</label><input id="p-size" type="range" min="1" max="50" step="1" value="2" /><span
          class="v"
          id="v-size"
          >2</span
        ></div
      >
    </div>

    <script type="module">
      import '@folkjs/labs/standalone/folk-shape';
      import '@folkjs/labs/standalone/folk-holographic-rc';

      const presets = [
        { name: 'Eraser', css: null, rgb: [0, 0, 0] },
        { name: 'Black', css: '#000', rgb: [0, 0, 0] },
        { name: 'Red', css: '#ff4444', rgb: [1, 0.25, 0.25] },
        { name: 'Orange', css: '#ff8833', rgb: [1, 0.5, 0.2] },
        { name: 'Yellow', css: '#dddd33', rgb: [0.75, 0.75, 0.2] },
        { name: 'Green', css: '#44dd55', rgb: [0.25, 0.8, 0.35] },
        { name: 'Cyan', css: '#44dddd', rgb: [0.25, 0.75, 0.75] },
        { name: 'Blue', css: '#4466ff', rgb: [0.3, 0.4, 1] },
        { name: 'Purple', css: '#aa44ff', rgb: [0.65, 0.3, 1] },
        { name: 'White', css: '#ffffff', rgb: [0.8, 0.8, 0.8] },
      ];

      const toHex = (rgb) =>
        '#' +
        rgb
          .map((c) =>
            Math.round(Math.pow(Math.max(0, Math.min(1, c)), 1 / 2.2) * 255)
              .toString(16)
              .padStart(2, '0'),
          )
          .join('');
      const fromHex = (h) => [h.slice(1, 3), h.slice(3, 5), h.slice(5, 7)].map((s) => (parseInt(s, 16) / 255) ** 2.2);

      const pen = { color: [0.8, 0.8, 0.8], opacity: 1, albedo: 0, size: 16, eraser: false };
      let selectedShape = null;
      let panelOpen = false;

      const $ = (id) => document.getElementById(id);
      const hrc = $('hrc');
      const panelEl = $('panel');
      const panelTitle = $('panel-title');
      const swatchesEl = $('swatches');
      const customColor = $('custom-color');
      const colorBtn = $('color-btn');
      const sOpacity = $('p-opacity'),
        vOpacity = $('v-opacity');
      const sAlbedo = $('p-albedo'),
        vAlbedo = $('v-albedo');
      const sSize = $('p-size'),
        vSize = $('v-size');
      const sizeRow = $('size-row');
      const exposureSlider = $('exposure-slider'),
        exposureValue = $('exposure-value');
      const probeSlider = $('probe-slider'),
        probeValue = $('probe-value');
      const sceneSelect = $('scene-select');

      // ── Panel toggle ──
      function togglePanel(force) {
        panelOpen = force !== undefined ? force : !panelOpen;
        panelEl.classList.toggle('open', panelOpen);
        colorBtn.classList.toggle('open', panelOpen);
      }
      colorBtn.addEventListener('click', () => togglePanel());

      // ── Info popup ──
      const infoPopup = $('info-popup');
      $('info-btn').addEventListener('click', () => {
        infoPopup.classList.toggle('open');
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#info-popup') && !e.target.closest('#info-btn')) {
          infoPopup.classList.remove('open');
        }
      });

      // ── Fullscreen ──
      $('fs-btn').addEventListener('click', () => {
        if (document.fullscreenElement) document.exitFullscreen();
        else document.documentElement.requestFullscreen();
      });

      // ── Swatches ──
      const swatchEls = [];
      presets.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'sw' + (i === 0 ? ' eraser' : '');
        if (p.css) el.style.backgroundColor = p.css;
        el.title = p.name;
        el.addEventListener('click', () => pickPreset(i));
        swatchesEl.insertBefore(el, customColor);
        swatchEls.push(el);
      });

      function pickPreset(idx) {
        pen.eraser = idx === 0;
        if (idx > 0) pen.color = [...presets[idx].rgb];
        if (selectedShape && idx > 0) selectedShape.setAttribute('data-rgb', pen.color.join(','));
        syncPanel();
        syncMouse();
      }

      customColor.addEventListener('input', () => {
        pen.color = fromHex(customColor.value);
        pen.eraser = false;
        if (selectedShape) selectedShape.setAttribute('data-rgb', pen.color.join(','));
        syncPanel();
        syncMouse();
      });

      // ── Panel slider wiring ──
      const f2 = (v) => v.toFixed(2);
      const f3 = (v) => (v < 0.1 ? v.toFixed(3) : v.toFixed(2));

      sOpacity.addEventListener('input', () => {
        const raw = Number(sOpacity.value);
        const opacity = raw * raw * raw;
        vOpacity.textContent = f3(opacity);
        if (selectedShape) selectedShape.setAttribute('data-opacity', String(opacity));
        else { pen.opacity = opacity; syncMouse(); }
      });
      sAlbedo.addEventListener('input', () => {
        const v = Number(sAlbedo.value);
        vAlbedo.textContent = f2(v);
        if (selectedShape) selectedShape.setAttribute('data-albedo', String(v));
        else { pen.albedo = v; syncMouse(); }
      });
      sSize.addEventListener('input', () => {
        pen.size = Number(sSize.value);
        vSize.textContent = String(pen.size);
        hrc.setMouseLightRadius(pen.size / 2);
      });

      function syncPanel() {
        const shape = selectedShape;
        panelTitle.textContent = shape ? 'Shape' : 'Pen';
        sizeRow.style.display = shape ? 'none' : '';

        let color, opacity, albedo;
        if (shape) {
          const rgbAttr = shape.getAttribute('data-rgb');
          color = rgbAttr ? rgbAttr.split(',').map(Number) : [0, 0, 0];
          opacity = Number(shape.getAttribute('data-opacity') ?? 1);
          albedo = Number(shape.getAttribute('data-albedo') ?? 0);
        } else {
          ({ color, opacity, albedo } = pen);
        }

        customColor.value = toHex(color);
        sOpacity.value = Math.cbrt(opacity);
        vOpacity.textContent = f3(opacity);
        sAlbedo.value = albedo;
        vAlbedo.textContent = f2(albedo);
        if (!shape) {
          sSize.value = pen.size;
          vSize.textContent = String(pen.size);
        }

        swatchEls.forEach((el, i) => el.classList.toggle('active', pen.eraser && i === 0));
        colorBtn.style.backgroundColor = pen.eraser ? '' : toHex(shape ? color : pen.color);
      }

      function selectShape(shape) {
        if (selectedShape) selectedShape.style.outline = '';
        selectedShape = shape;
        if (shape) {
          shape.style.outline = '2px solid rgba(100, 180, 255, 0.8)';
          togglePanel(true);
        }
        syncPanel();
      }

      function syncMouse() {
        const [r, g, b] = pen.eraser ? [0, 0, 0] : pen.color;
        hrc.setMouseLightColor(r, g, b);
        hrc.setMouseLightMaterial(pen.eraser ? 0 : pen.opacity, pen.albedo);
      }

      // ── Shape selection ──
      hrc.addEventListener('focusin', (e) => {
        if (e.target.tagName === 'FOLK-SHAPE') selectShape(e.target);
      });
      document.addEventListener('pointerdown', (e) => {
        if (!selectedShape) return;
        if (e.target.closest('#panel') || e.target.closest('#controls')) return;
        if (e.target.tagName === 'FOLK-SHAPE') return;
        selectShape(null);
      });

      // ── Controls ──
      function setExposure(v) {
        v = Math.max(0.1, Math.min(10, v));
        hrc.exposure = v;
        exposureSlider.value = v;
        exposureValue.textContent = v.toFixed(1);
      }
      const normalCounts = [
        ...new Set([32, 64, 128, 256, 512, 1024, 2048, ...Array.from({ length: 20 }, (_, i) => (i + 1) * 100)]),
      ].sort((a, b) => a - b);
      const ppCounts = [16, 32, 64, 128, 256, 512, 1024, 2048];
      let ppMode = false;
      let probeCounts = normalCounts;

      function setProbeSize(size) {
        const idx = probeCounts.indexOf(size);
        const i = idx >= 0 ? idx : probeCounts.findIndex((v) => v >= size) || probeCounts.length - 1;
        const actual = probeCounts[Math.max(0, i)];
        hrc.probeCount = actual;
        probeSlider.max = probeCounts.length - 1;
        probeSlider.value = Math.max(0, i);
        probeValue.textContent = actual;
        if (ppMode) hrc.pixelPerfect = actual;
      }

      function setPPMode(on) {
        ppMode = on;
        probeCounts = on ? ppCounts : normalCounts;
        if (on) {

      // ── Sky controls ──
      const skySelect = $('sky-select');
      function buildSky(fn) {
        const PI = Math.PI,
          N = 256,
          data = new Float32Array(N * 4);
        function wrap(d) {
          return d > PI ? d - PI * 2 : d < -PI ? d + PI * 2 : d;
        }
        function spot(angle, sigma, color) {
          const inv = 1 / (2 * sigma * sigma);
          for (let i = 0; i < N; i++) {
            const a = (i / N) * PI * 2 - PI;
            const w = wrap(a - angle);
            const g = Math.exp(-(w * w) * inv);
            data[i * 4] += color[0] * g;
            data[i * 4 + 1] += color[1] * g;
            data[i * 4 + 2] += color[2] * g;
          }
        }
        function fill(color) {
          for (let i = 0; i < N; i++) {
            data[i * 4] += color[0];
            data[i * 4 + 1] += color[1];
            data[i * 4 + 2] += color[2];
          }
        }
        function arc(center, halfWidth, color) {
          for (let i = 0; i < N; i++) {
            const a = (i / N) * PI * 2 - PI;
            const d = Math.abs(wrap(a - center));
            const t = Math.max(0, 1 - d / halfWidth);
            data[i * 4] += color[0] * t;
            data[i * 4 + 1] += color[1] * t;
            data[i * 4 + 2] += color[2] * t;
          }
        }
        function hueRing(intensity, saturation, offset) {
          for (let i = 0; i < N; i++) {
            const h = (i / N + (offset || 0)) % 1;
            const s = saturation ?? 1;
            const k = (n) => (n + h * 6) % 6;
            const f = (n) => intensity * (1 - s * Math.max(0, Math.min(k(n), 4 - k(n), 1)));
            data[i * 4] += f(0);
            data[i * 4 + 1] += f(4);
            data[i * 4 + 2] += f(2);
          }
        }
        fn({ spot, fill, arc, hueRing, PI, N, data, wrap });
        for (let i = 0; i < N; i++) data[i * 4 + 3] = 1;
        hrc.setSkyCircle(data);
      }

      function applySky(name) {
        const PI = Math.PI;
        switch (name) {
          case 'none':
            hrc.clearSky();
            break;
          case 'overcast':
            hrc.setSkyColor(0.04, 0.045, 0.05);
            break;
          case 'spectrum':
            buildSky(({ hueRing }) => {
              hueRing(1.5, 1, 0);
            });
            break;
          case 'iridescent':
            buildSky(({ PI, N, data }) => {
              for (let i = 0; i < N; i++) {
                const t = i / N;
                const phase = t * PI * 3;
                const r = 0.5 + 0.5 * Math.cos(phase);
                const g = 0.5 + 0.5 * Math.cos(phase + PI * 0.7);
                const b = 0.5 + 0.5 * Math.cos(phase + PI * 1.4);
                const brightness = 0.6 + 0.4 * Math.cos(t * PI * 2);
                data[i * 4] = r * brightness;
                data[i * 4 + 1] = g * brightness;
                data[i * 4 + 2] = b * brightness;
              }
            });
            break;
          case 'studio':
            buildSky(({ spot, PI }) => {
              spot(-PI * 0.65, 0.08, [2.2, 2.4, 2.8]);
              spot(-PI * 0.35, 0.1, [2.5, 2.2, 1.8]);
              spot(PI * 0.8, 0.12, [2.0, 2.0, 2.3]);

            break;
          case 'rgb':
            buildSky(({ spot, PI }) => {
              const s = (PI * 2) / 3;
              spot(-PI / 2, 0.04, [4, 0.05, 0.05]);
              spot(-PI / 2 + s, 0.04, [0.05, 4, 0.05]);
              spot(-PI / 2 + s * 2, 0.04, [0.05, 0.05, 4]);
            });
            break;
          case 'sunset':
            buildSky(({ spot, PI, N, data }) => {
              spot(-PI / 8, 0.09, [1.8, 0.5, 0.15]);
              for (let i = 0; i < N; i++) {
                const a = (i / N) * PI * 2 - PI;
                const vert = Math.sin(a) * 0.5 + 0.5;
                data[i * 4] += 0.08 * (1 - vert);
                data[i * 4 + 1] += 0.03 * (1 - vert);
                data[i * 4 + 2] += 0.06 * vert;
              }
            });
            break;
          case 'moonlight':
            buildSky(({ spot, fill, PI }) => {
              spot(-PI / 3, 0.04, [0.4, 0.5, 0.7]);
              fill([0.002, 0.003, 0.006]);
            });
            break;
        }

      const TICKS = [2, 4, 8, 16, 32, 64];

      function drawPerfGraph() {
        const ctx = perfCtx;
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        ctx.clearRect(0, 0, GW, GH);

        let dataMax = 1;
        for (let i = 0; i < N_SAMPLES; i++) {
          const total = cpuSamples[i] + gpuSamples[i];
          if (total > dataMax) dataMax = total;
          if (cpuSamples[i] > dataMax) dataMax = cpuSamples[i];
        }
        let ceilTick = TICKS[TICKS.length - 1];
        for (const t of TICKS) {
          if (t >= dataMax) {
            ceilTick = t;
            break;
          }
        }
        const target = Math.max(ceilTick * 1.1, 8);
        if (target > scaleMax) scaleMax = target;
        else scaleMax += (target - scaleMax) * 0.03;
        const sqrtMax = Math.sqrt(scaleMax);
        const toY = (ms) => PH - (Math.sqrt(Math.max(0, ms)) / sqrtMax) * PH;

        ctx.fillStyle = 'rgba(255,255,255,0.03)';
        ctx.fillRect(ML, 0, PW, PH);

        ctx.font = '9px monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        for (const ms of TICKS) {
          if (ms > scaleMax * 0.98) continue;
          const y = toY(ms);
          if (y < 6 || y > PH - 4) continue;
          const isBudget = ms === 16 || ms === 32;
          ctx.strokeStyle = isBudget ? 'rgba(100,255,100,0.2)' : 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(ML, y);
          ctx.lineTo(GW, y);
          ctx.stroke();
          ctx.fillStyle = isBudget ? 'rgba(100,255,100,0.5)' : 'rgba(255,255,255,0.25)';
          ctx.fillText(`${ms}`, ML - 3, y);
        }

        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ML, 0);
        ctx.lineTo(ML, PH);
        ctx.stroke();

        function drawLine(samples, color) {
          ctx.strokeStyle = color;
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          for (let i = 0; i < N_SAMPLES; i++) {
            const si = (sampleIdx + i) % N_SAMPLES;
            const x = ML + i;
            const y = Math.max(0, Math.min(PH, toY(samples[si])));
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
        drawLine(cpuSamples, 'rgba(100,200,255,0.85)');
        drawLine(gpuSamples, 'rgba(255,150,80,0.85)');
      }

      let lastFpsUpdate = 0;
      (function tick(now) {
        const jsMs = hrc.jsTimeMs;
        const gpuMs = hrc.gpuTimeMs;

        avgCpu += (jsMs - avgCpu) * 0.05;
        if (gpuMs > 0) avgGpu += (gpuMs - avgGpu) * 0.05;
        const fps = hrc.fps;
        if (fps > 0) avgFps += (fps - avgFps) * 0.05;

        cpuSamples[sampleIdx] = jsMs;
        gpuSamples[sampleIdx] = gpuMs;
        sampleIdx = (sampleIdx + 1) % N_SAMPLES;

        if (now - lastFpsUpdate > 250) {
          lastFpsUpdate = now;
          fpsEl.textContent = `${Math.round(avgFps)} fps`;
          $('rmse-display').style.display = hrc.debugMode === 3 ? '' : 'none';
        }
        if (perfOpen) {
          drawPerfGraph();
          perfFpsEl.textContent = `${Math.round(avgFps)} fps`;
          perfCpuEl.textContent = `js ${avgCpu.toFixed(1)}ms`;
          perfGpuEl.textContent = avgGpu > 0 ? `gpu ${avgGpu.toFixed(1)}ms` : 'gpu N/A';
        }
        requestAnimationFrame(tick);
      })(0);

      // ── RMSE polling (async, separate from render loop) ──
      let rmsePolling = false;
      setInterval(async () => {
        if (hrc.debugMode !== 3 || rmsePolling) return;
        rmsePolling = true;
        try {
          const r = await hrc.computeRMSE();
          $('rmse-display').textContent = r > 0 ? `RMSE ${r.toFixed(5)}` : 'RMSE …';
        } catch (e) { console.warn('RMSE error:', e); }
        rmsePolling = false;
      }, 1000);

      // ── Keyboard ──
      document.addEventListener('keydown', (e) => {
        if (e.target instanceof HTMLInputElement && e.target.type === 'text') return;
        const d = e.code.match(/^Digit(\d)$/);
        if (d) {
          e.preventDefault();
          e.target?.blur?.();
          e.shiftKey ? switchScene(+d[1]) : pickPreset(+d[1]);
          return;
        }
        let handled = true;
        switch (e.key) {
          case '=':
          case '+':
            pen.size = Math.min(50, pen.size + 2);
            sSize.value = pen.size;
            vSize.textContent = String(pen.size);
            hrc.setMouseLightRadius(pen.size / 2);
            break;
          case '-':
          case '_':
            pen.size = Math.max(1, pen.size - 2);
            sSize.value = pen.size;
            vSize.textContent = String(pen.size);
            hrc.setMouseLightRadius(pen.size / 2);
            break;
          case 'c':
          case 'C':
            hrc.clearLines();
            break;
          case 's':
          case 'S':
            hrc.saveScreenshot(`hrc-${Date.now()}.png`);
            break;
          case 'f':
          case 'F':
            if (document.fullscreenElement) document.exitFullscreen();
            else document.documentElement.requestFullscreen();
            break;
          case 't':
          case 'T': {
            const timings = hrc.gpuPassTimings;
            if (!timings.length) {
              console.log('No GPU pass timings available');
              break;
            }
            const groups = {};
            timings.forEach(({ label, ms }) => {
              const cat = label.replace(/\d+$/, '').replace(/\.[^.]*$/, '');
              const type = label.includes('.') ? label.split('.')[1].replace(/\d+$/, '') : label;
              groups[type] = (groups[type] || 0) + ms;
            });
            console.log(timings.map(({ label, ms }) => ({ pass: label, ms: ms.toFixed(3) })));
            console.table(Object.entries(groups).map(([type, ms]) => ({ type, ms: ms.toFixed(2) })));
            console.log(`Total: ${timings.reduce((s, t) => s + t.ms, 0).toFixed(2)}ms`);
            break;
          }
          case 'ArrowRight':
            switchScene((currentScene + 1) % scenes.length);
            break;
          case 'ArrowLeft':
            switchScene((currentScene - 1 + scenes.length) % scenes.length);
            break;
          case 'n':
          case 'N': {
            const cx = window.innerWidth / 2,
              cy = hrc.clientHeight / 2;
            const el = document.createElement('folk-shape');
            el.setAttribute('x', cx - 30);
            el.setAttribute('y', cy - 30);
            el.setAttribute('width', 60);
            el.setAttribute('height', 60);
            el.setAttribute('data-rgb', pen.color.join(','));
            el.setAttribute('data-opacity', String(pen.opacity));
            el.setAttribute('data-albedo', String(pen.albedo));
            hrc.appendChild(el);
            break;
          }
          case 'Delete':
          case 'Backspace':
            if (document.activeElement?.tagName === 'FOLK-SHAPE') {
              document.activeElement.remove();
              selectShape(null);
            }
            break;
          default:
            handled = false;
        }
        if (handled) {
          e.preventDefault();
          e.target?.blur?.();
        }
      });

      // ── Drawing ──
      let drawing = false,
        lastX = 0,
        lastY = 0;

      document.addEventListener('pointerdown', (e) => {
        if (e.target.tagName === 'FOLK-SHAPE' || e.target.closest('#panel') || e.target.closest('#bar')) return;
        const rect = hrc.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
        if (selectedShape) {
          selectShape(null);
          e.preventDefault();
          return;
        }
        if (document.activeElement?.tagName === 'FOLK-SHAPE') document.activeElement.blur();
        drawing = true;
        lastX = e.clientX;
        lastY = e.clientY;
        e.preventDefault();
      });

      document.addEventListener('pointermove', (e) => {
        if (!drawing || e.buttons === 0) { drawing = false; return; }
        const dx = e.clientX - lastX,
          dy = e.clientY - lastY;
        if (Math.sqrt(dx * dx + dy * dy) >= 4) {
          if (pen.eraser) hrc.eraseAt(e.clientX, e.clientY, pen.size);
          else hrc.addLine(lastX, lastY, e.clientX, e.clientY, pen.color, pen.size, pen.opacity, pen.albedo);
          lastX = e.clientX;
          lastY = e.clientY;
        }
      });

      document.addEventListener('pointerup', (e) => {
        if (!drawing) return;
        if (pen.eraser) {
          hrc.eraseAt(e.clientX, e.clientY, pen.size);
        } else if (Math.abs(e.clientX - lastX) > 1 || Math.abs(e.clientY - lastY) > 1) {
          hrc.addLine(lastX, lastY, e.clientX, e.clientY, pen.color, pen.size, pen.opacity, pen.albedo);
        } else {
          hrc.addLine(lastX, lastY, lastX, lastY, pen.color, pen.size, pen.opacity, pen.albedo);
        }
        drawing = false;
      });
    </script>
  </body>
</html>
