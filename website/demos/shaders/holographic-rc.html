<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic Radiance Cascade</title>
    <style>
      html {
        height: 100%;
      }

      body {
        min-height: 100%;
        position: relative;
        margin: 0;
        overscroll-behavior: none;
        background: #111;
      }

      folk-shape {
        position: absolute;
        background-color: transparent;
      }

      #color-indicator {
        position: fixed;
        top: 10px;
        right: 10px;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.5);
        z-index: 1000;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        transition: transform 0.1s;
      }

      #color-indicator:hover {
        transform: scale(1.15);
      }

      #color-indicator.eraser {
        background: repeating-conic-gradient(#666 0% 25%, #999 0% 50%) 50% / 8px 8px;
      }

      #controls {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      #scene-select {
        font-family: monospace;
        font-size: 12px;
        background: rgba(0, 0, 0, 0.55);
        color: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 4px;
        padding: 3px 6px;
        cursor: pointer;
        outline: none;
      }

      #scene-select:hover {
        border-color: rgba(255, 255, 255, 0.4);
      }

      #exposure-control {
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.6);
      }

      #exposure-slider {
        width: 100px;
        accent-color: rgba(255, 255, 255, 0.5);
      }

      #help-text {
        position: fixed;
        bottom: 10px;
        left: 10px;
        z-index: 1000;
        font-family: monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.4);
        pointer-events: none;
        line-height: 1.8;
      }

      #help-text kbd {
        display: inline-block;
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 3px;
        padding: 0 4px;
        font-family: monospace;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <div id="color-indicator" title="Click to cycle color"></div>
    <div id="controls">
      <select id="scene-select"></select>
      <div id="exposure-control">
        <label for="exposure-slider">exposure</label>
        <input id="exposure-slider" type="range" min="0.1" max="10" step="0.1" value="2" />
        <span id="exposure-value">2.00</span>
      </div>
    </div>
    <div id="help-text">
      <kbd>0</kbd>–<kbd>9</kbd> color &nbsp; <kbd>+</kbd><kbd>−</kbd> size &nbsp; <kbd>[</kbd><kbd>]</kbd> exposure
      &nbsp; <kbd>C</kbd> clear &nbsp; <kbd>D</kbd> debug dir &nbsp; <kbd>`</kbd> cascade count &nbsp; <kbd>⇧</kbd><kbd>0</kbd>–<kbd>9</kbd> scene &nbsp; click swatch to cycle
    </div>

    <folk-holographic-rc id="hrc"></folk-holographic-rc>

    <script type="module">
      import '@folkjs/labs/standalone/folk-shape';
      import '@folkjs/labs/standalone/folk-holographic-rc';

      const colors = [
        { name: 'Off', css: '#333', rgb: [0, 0, 0] },
        { name: 'Black', css: '#111', rgb: [0.05, 0.05, 0.05] },
        { name: 'Red', css: '#ff4444', rgb: [1, 0.25, 0.25] },
        { name: 'Orange', css: '#ff8833', rgb: [1, 0.5, 0.2] },
        { name: 'Yellow', css: '#dddd33', rgb: [0.75, 0.75, 0.2] },
        { name: 'Green', css: '#44dd55', rgb: [0.25, 0.8, 0.35] },
        { name: 'Cyan', css: '#44dddd', rgb: [0.25, 0.75, 0.75] },
        { name: 'Blue', css: '#4466ff', rgb: [0.3, 0.4, 1] },
        { name: 'Purple', css: '#aa44ff', rgb: [0.65, 0.3, 1] },
        { name: 'White', css: '#ffffff', rgb: [0.8, 0.8, 0.8] },
      ];

      const scenes = [
        { name: 'Pinhole', fn: loadPinhole },
        { name: 'Empty', fn: loadEmpty },
        { name: 'Center block', fn: loadCenterBlock },
        { name: 'Thin walls', fn: loadThinWalls },
        { name: 'Pillars', fn: loadPillars },
        { name: 'Corner trap', fn: loadCorner },
        { name: 'Color mix', fn: loadColorMix },
        { name: 'Stained glass', fn: loadStainedGlass },
        { name: 'Color shadows', fn: loadColorShadows },
        { name: 'Orbit', fn: loadAnimatedOrbit },
        { name: 'Gate', fn: loadAnimatedGate },
      ];

      let currentColor = 2;
      let currentScene = 0;
      let lineThickness = 8;
      const indicator = document.getElementById('color-indicator');
      const hrc = document.getElementById('hrc');
      const sceneSelect = document.getElementById('scene-select');
      const exposureSlider = document.getElementById('exposure-slider');
      const exposureValue = document.getElementById('exposure-value');

      function setExposure(val) {
        val = Math.max(0.1, Math.min(10, val));
        hrc.exposure = val;
        exposureSlider.value = val;
        exposureValue.textContent = val.toFixed(2);
      }

      exposureSlider.addEventListener('input', () => setExposure(Number(exposureSlider.value)));

      function updateMouseRadius() {
        hrc.setMouseLightRadius(lineThickness / 2);
      }
      updateMouseRadius();

      scenes.forEach((scene, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = `Scene ${i}: ${scene.name}`;
        sceneSelect.appendChild(option);
      });
      sceneSelect.addEventListener('change', () => switchScene(Number(sceneSelect.value)));

      function updateIndicator() {
        const color = colors[currentColor];
        if (currentColor === 0) {
          indicator.style.backgroundColor = '';
          indicator.classList.add('eraser');
        } else {
          indicator.classList.remove('eraser');
          indicator.style.backgroundColor = color.css;
        }
      }

      function updateMouseLightColor() {
        const c = colors[currentColor];
        hrc.setMouseLightColor(c.rgb[0], c.rgb[1], c.rgb[2]);
      }

      function updateSceneLabel() {
        sceneSelect.value = currentScene;
      }

      updateIndicator();
      updateMouseLightColor();

      indicator.addEventListener('click', () => {
        currentColor = currentColor >= colors.length - 1 ? 1 : currentColor + 1;
        updateIndicator();
        updateMouseLightColor();
      });

      // --- Scene helpers ---
      let animationId = null;

      function clearScene() {
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
        hrc.clearLines();
        hrc.querySelectorAll('folk-shape').forEach((s) => s.remove());
      }

      function addShape(x, y, w, h, colorIdx) {
        const el = document.createElement('folk-shape');
        el.setAttribute('x', x);
        el.setAttribute('y', y);
        el.setAttribute('width', w);
        el.setAttribute('height', h);
        if (colorIdx !== undefined) el.setAttribute('data-color', colorIdx);
        hrc.appendChild(el);
        return el;
      }

      function switchScene(index) {
        currentScene = index;
        clearScene();
        scenes[index].fn();
        updateSceneLabel();
      }

      // --- Scene definitions ---
      function loadPinhole() {
        const W = window.innerWidth;
        const H = window.innerHeight;
        const cx = W / 2;
        const cy = H / 2;

        const barW = 16;
        const barH = 24;
        const gap = 3;
        const barColors = [2, 3, 4, 5, 6, 7, 8];
        const totalH = barColors.length * barH + (barColors.length - 1) * gap;
        const barX = cx - 200;
        const barStartY = cy - totalH / 2;
        for (let i = 0; i < barColors.length; i++) {
          addShape(barX, barStartY + i * (barH + gap), barW, barH, barColors[i]);
        }

        const wallX = cx - 5;
        const wallW = 8;
        const pinholeSize = 24;
        const pinholeY = cy - pinholeSize / 2;
        addShape(wallX, 0, wallW, pinholeY, 1);
        addShape(wallX, pinholeY + pinholeSize, wallW, H - (pinholeY + pinholeSize), 1);
      }

      function loadEmpty() {}

      function loadCenterBlock() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        addShape(cx - 60, cy - 60, 120, 120, 1);
      }

      function loadThinWalls() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        addShape(cx - 200, cy - 80, 400, 1, 1);
        addShape(cx - 200, cy - 20, 400, 2, 1);
        addShape(cx - 200, cy + 40, 400, 4, 1);
        addShape(cx - 200, cy + 110, 400, 8, 1);
      }

      function loadPillars() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const spacing = 120;
        const count = 5;
        const startX = cx - ((count - 1) * spacing) / 2;
        for (let i = 0; i < count; i++) {
          addShape(startX + i * spacing - 15, cy - 80, 30, 160, 1);
        }
      }

      function loadCorner() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        addShape(cx - 150, cy - 150, 300, 20, 1);
        addShape(cx - 150, cy - 150, 20, 300, 1);
      }

      function loadColorMix() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        addShape(cx - 40, cy - 40, 80, 80, 1);
        const red = addShape(cx - 150, cy - 120, 50, 50, 2);
        const green = addShape(cx + 100, cy - 120, 50, 50, 5);
        const blue = addShape(cx - 25, cy + 100, 50, 50, 7);
        const baseR = 140;
        const angles = [-Math.PI * 0.75, -Math.PI * 0.25, Math.PI * 0.5];
        const shapes = [red, green, blue];
        function animate() {
          const t = performance.now() / 2500;
          for (let i = 0; i < 3; i++) {
            const phase = t + (i * Math.PI * 2) / 3;
            const r = baseR * (0.5 + 0.5 * Math.sin(phase));
            const a = angles[i];
            shapes[i].setAttribute('x', cx + Math.cos(a) * r - 25);
            shapes[i].setAttribute('y', cy + Math.sin(a) * r - 25);
          }
          animationId = requestAnimationFrame(animate);
        }
        animate();
      }

      function loadStainedGlass() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const wallX = cx - 10;
        addShape(wallX, cy - 180, 20, 60, 1);
        addShape(wallX, cy - 100, 20, 20, 2);
        addShape(wallX, cy - 80, 20, 30, 1);
        addShape(wallX, cy - 50, 20, 20, 5);
        addShape(wallX, cy - 30, 20, 30, 1);
        addShape(wallX, cy, 20, 20, 7);
        addShape(wallX, cy + 20, 20, 30, 1);
        addShape(wallX, cy + 50, 20, 20, 4);
        addShape(wallX, cy + 70, 20, 110, 1);
      }

      function loadColorShadows() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        addShape(cx - 200, cy - 100, 40, 40, 2);
        addShape(cx - 200, cy + 60, 40, 40, 7);
        addShape(cx - 40, cy - 80, 20, 160, 1);
        addShape(cx + 100, cy - 120, 10, 240, 9);
      }

      function loadAnimatedOrbit() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        addShape(cx - 20, cy - 180, 40, 40, 2);
        addShape(cx + 140, cy - 20, 40, 40, 5);
        addShape(cx - 20, cy + 140, 40, 40, 7);
        addShape(cx - 180, cy - 20, 40, 40, 4);
        const block = addShape(cx - 30, cy - 30, 60, 60, 1);
        const orbitR = 100;
        function animate() {
          const t = performance.now() / 2000;
          block.setAttribute('x', cx + Math.cos(t) * orbitR - 30);
          block.setAttribute('y', cy + Math.sin(t) * orbitR - 30);
          animationId = requestAnimationFrame(animate);
        }
        animate();
      }

      function loadAnimatedGate() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const orange = addShape(cx - 250, cy - 25, 50, 50, 3);
        const left = addShape(cx - 160, cy - 10, 140, 20, 1);
        const right = addShape(cx + 20, cy - 10, 140, 20, 1);
        const cyan = addShape(cx + 200, cy - 25, 50, 50, 6);
        function animate() {
          const t = performance.now() / 3000;
          const gap = 20 + Math.abs(Math.sin(t)) * 120;
          left.setAttribute('x', cx - gap / 2 - 140);
          left.setAttribute('y', cy - 10);
          right.setAttribute('x', cx + gap / 2);
          right.setAttribute('y', cy - 10);
          const drift = Math.sin(t * 1.3) * 80;
          orange.setAttribute('y', cy - 25 + drift);
          cyan.setAttribute('y', cy - 25 - drift);
          animationId = requestAnimationFrame(animate);
        }
        animate();
      }

      switchScene(0);

      // --- Key handling ---
      document.addEventListener('keydown', (e) => {
        const digitMatch = e.code.match(/^Digit(\d)$/);
        if (digitMatch) {
          const num = parseInt(digitMatch[1]);
          if (e.shiftKey) {
            switchScene(num);
          } else {
            currentColor = num;
            updateIndicator();
            updateMouseLightColor();
          }
          return;
        }
        if (e.key === '=' || e.key === '+') {
          lineThickness = Math.min(50, lineThickness + 2);
          updateMouseRadius();
        } else if (e.key === '-' || e.key === '_') {
          lineThickness = Math.max(2, lineThickness - 2);
          updateMouseRadius();
        }
        if (e.key === ']') {
          setExposure(hrc.exposure + 0.2);
        } else if (e.key === '[') {
          setExposure(hrc.exposure - 0.2);
        }
        if (e.key === 'c' || e.key === 'C') {
          hrc.clearLines();
        }
        if (e.key === 'Delete' || e.key === 'Backspace') {
          const selected = hrc.querySelector('folk-shape[aria-selected="true"]');
          if (selected) selected.remove();
        }
      });

      // --- Freehand drawing ---
      let isDrawing = false;
      let lastX = 0,
        lastY = 0;
      const minSegmentLength = 4;

      document.addEventListener('pointerdown', (e) => {
        const target = e.target;
        if (
          target.tagName === 'FOLK-SHAPE' ||
          target.id === 'color-indicator' ||
          target.id === 'scene-select' ||
          target.id === 'help-text' ||
          target.closest('#exposure-control')
        ) {
          return;
        }

        const rect = hrc.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
          return;
        }

        isDrawing = true;
        lastX = e.clientX;
        lastY = e.clientY;
        e.preventDefault();
      });

      document.addEventListener('pointermove', (e) => {
        if (!isDrawing) return;

        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist >= minSegmentLength) {
          if (currentColor === 0) {
            hrc.eraseAt(e.clientX, e.clientY, lineThickness);
          } else {
            hrc.addLine(lastX, lastY, e.clientX, e.clientY, currentColor, lineThickness);
          }
          lastX = e.clientX;
          lastY = e.clientY;
        }
      });

      document.addEventListener('pointerup', (e) => {
        if (!isDrawing) return;

        if (currentColor === 0) {
          hrc.eraseAt(e.clientX, e.clientY, lineThickness);
        } else {
          const dx = e.clientX - lastX;
          const dy = e.clientY - lastY;
          if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
            hrc.addLine(lastX, lastY, e.clientX, e.clientY, currentColor, lineThickness);
          }
        }

        isDrawing = false;
      });
    </script>
  </body>
</html>
