<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRC Minimal</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        display: flex;
        flex-direction: column;
        background: #111;
        font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.6);
      }
      #canvas-area {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      folk-hrc-minimal {
        aspect-ratio: 1;
        height: 100%;
        max-width: 100%;
      }

      #bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 5px 12px;
        background: #0a0a0a;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
        z-index: 1000;
      }
      #bar .g {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      #bar input[type='range'] {
        width: 72px;
      }
      #bar label {
        cursor: pointer;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      #bar .v {
        width: 28px;
        text-align: right;
        color: rgba(255, 255, 255, 0.4);
      }
      .spacer {
        flex: 1;
      }
      #fps {
        color: rgba(255, 255, 255, 0.4);
        white-space: nowrap;
      }
      #color-btn {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
      }
      #color-btn:hover {
        border-color: rgba(255, 255, 255, 0.5);
      }
      #color-btn.open {
        border-color: rgba(255, 255, 255, 0.7);
      }
      #load-btn,
      #save-btn {
        background: none;
        border: none;
        color: rgba(255, 255, 255, 0.35);
        cursor: pointer;
        font-size: 14px;
        padding: 0 2px;
        line-height: 1;
      }
      #load-btn:hover,
      #save-btn:hover {
        color: rgba(255, 255, 255, 0.7);
      }

      #panel {
        position: fixed;
        bottom: 36px;
        right: 8px;
        z-index: 1001;
        background: rgba(10, 10, 10, 0.88);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        padding: 10px 12px 8px;
        min-width: 160px;
        user-select: none;
        display: none;
      }
      #panel.open {
        display: block;
      }
      #panel-title {
        font-size: 9px;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 8px;
      }
      #swatches {
        display: flex;
        gap: 4px;
        margin-bottom: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .sw {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
      }
      .sw:hover {
        border-color: rgba(255, 255, 255, 0.4);
      }
      .sw.active {
        border-color: rgba(255, 255, 255, 0.8);
      }
      .sw.eraser {
        background: repeating-conic-gradient(#555 0% 25%, #888 0% 50%) 50% / 8px 8px;
      }
      #custom-color {
        width: 18px;
        height: 16px;
        border: none;
        padding: 0;
        cursor: pointer;
        background: none;
        border-radius: 4px;
      }
      #custom-color::-webkit-color-swatch-wrapper {
        padding: 0;
      }
      #custom-color::-webkit-color-swatch {
        border: 1.5px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      .prow {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 20px;
      }
      .prow label {
        width: 48px;
        color: rgba(255, 255, 255, 0.45);
        flex-shrink: 0;
        font-size: 10px;
      }
      .prow input[type='range'] {
        flex: 1;
        min-width: 50px;
      }
      .prow .v {
        width: 28px;
        text-align: right;
        color: rgba(255, 255, 255, 0.4);
        font-size: 10px;
        flex-shrink: 0;
      }

      input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        height: 20px;
        background: transparent;
        outline: none;
        cursor: pointer;
      }
      input[type='range']::-webkit-slider-runnable-track {
        height: 3px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 2px;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        border: none;
        cursor: pointer;
        margin-top: -4.5px;
      }
    </style>
  </head>
  <body>
    <div id="canvas-area">
      <folk-hrc-minimal id="hrc"></folk-hrc-minimal>
    </div>

    <div id="bar">
      <div class="g">
        <label>exposure</label>
        <input id="exposure-slider" type="range" min="0.1" max="10" step="0.5" value="2" />
        <span class="v" id="exposure-value">2.0</span>
      </div>
      <div class="g">
        <label>size</label>
        <input id="probe-slider" type="range" min="0" max="7" step="1" value="4" />
        <span class="v" id="probe-value">128</span>
      </div>
      <label><input id="fc-toggle" type="checkbox" /> false color</label>
      <div class="spacer"></div>
      <span id="fps"></span>
      <div id="color-btn" title="Pen"></div>
      <input id="scene-file" type="file" accept=".png" style="display: none" />
      <button id="load-btn" title="Load scene PNG">📂</button>
      <button id="save-btn" title="Save scene as PNG">💾</button>
    </div>

    <div id="panel">
      <div id="panel-title">Pen</div>
      <div id="swatches"><input type="color" id="custom-color" value="#cccccc" /></div>
      <div class="prow"
        ><label>opacity</label><input id="p-opacity" type="range" min="0" max="1" step="0.01" value="1" /><span
          class="v"
          id="v-opacity"
          >1.00</span
        ></div
      >
      <div class="prow"
        ><label>size</label><input id="p-size" type="range" min="1" max="50" step="1" value="2" /><span
          class="v"
          id="v-size"
          >2</span
        ></div
      >
    </div>

    <script type="module">
      import { FolkHrcMinimal } from '@folkjs/labs/folk-hrc-minimal';
      FolkHrcMinimal.define();

      // All colors are sRGB hex. No gamma conversion needed.
      const presets = [
        { name: 'Eraser', hex: null },
        { name: 'Black', hex: '#000000' },
        { name: 'Red', hex: '#ff4444' },
        { name: 'Orange', hex: '#ff8833' },
        { name: 'Yellow', hex: '#dddd33' },
        { name: 'Green', hex: '#44dd55' },
        { name: 'Cyan', hex: '#44dddd' },
        { name: 'Blue', hex: '#4466ff' },
        { name: 'Purple', hex: '#aa44ff' },
        { name: 'White', hex: '#ffffff' },
      ];

      const hexRgb = (h) => [
        parseInt(h.slice(1, 3), 16) / 255,
        parseInt(h.slice(3, 5), 16) / 255,
        parseInt(h.slice(5, 7), 16) / 255,
      ];

      const pen = { hex: '#cccccc', opacity: 1, size: 2, eraser: false };

      const $ = (id) => document.getElementById(id);
      const hrc = $('hrc');
      const panelEl = $('panel');
      const swatchesEl = $('swatches');
      const customColor = $('custom-color');
      const colorBtn = $('color-btn');
      const sOpacity = $('p-opacity'),
        vOpacity = $('v-opacity');
      const sSize = $('p-size'),
        vSize = $('v-size');

      let panelOpen = false;
      colorBtn.addEventListener('click', () => {
        panelOpen = !panelOpen;
        panelEl.classList.toggle('open', panelOpen);
        colorBtn.classList.toggle('open', panelOpen);
      });

      const swatchEls = [];
      presets.forEach((p, i) => {
        const el = document.createElement('div');
        el.className = 'sw' + (i === 0 ? ' eraser' : '');
        if (p.hex) el.style.backgroundColor = p.hex;
        el.title = p.name;
        el.addEventListener('click', () => pickPreset(i));
        swatchesEl.insertBefore(el, customColor);
        swatchEls.push(el);
      });

      function pickPreset(idx) {
        pen.eraser = idx === 0;
        if (idx > 0) pen.hex = presets[idx].hex;
        syncPanel();
        syncMouse();
      }

      customColor.addEventListener('input', () => {
        pen.hex = customColor.value;
        pen.eraser = false;
        syncPanel();
        syncMouse();
      });

      sOpacity.addEventListener('input', () => {
        const raw = Number(sOpacity.value);
        pen.opacity = raw * raw * raw;
        vOpacity.textContent = pen.opacity < 0.1 ? pen.opacity.toFixed(3) : pen.opacity.toFixed(2);
        syncMouse();
      });
      sSize.addEventListener('input', () => {
        pen.size = Number(sSize.value);
        vSize.textContent = String(pen.size);
        hrc.mouseLightRadius = pen.size / 2;
      });

      function syncPanel() {
        customColor.value = pen.hex;
        sOpacity.value = Math.cbrt(pen.opacity);
        vOpacity.textContent = pen.opacity < 0.1 ? pen.opacity.toFixed(3) : pen.opacity.toFixed(2);
        sSize.value = pen.size;
        vSize.textContent = String(pen.size);
        swatchEls.forEach((el, i) => el.classList.toggle('active', pen.eraser && i === 0));
        colorBtn.style.backgroundColor = pen.eraser ? '' : pen.hex;
      }

      function syncMouse() {
        hrc.mouseLightColor = pen.eraser ? [0, 0, 0] : hexRgb(pen.hex);
        hrc.mouseLightOpacity = pen.eraser ? 0 : pen.opacity;
      }

      // ── Drawing into sceneCanvas ──
      // Uses 'copy' compositing so pixel values are set exactly, not blended.

      function drawLine(x1, y1, x2, y2) {
        const ctx = hrc.sceneCtx;
        if (!ctx) return;
        const [r, g, b] = hexRgb(pen.hex);
        ctx.fillStyle = `rgba(${(r * 255) | 0},${(g * 255) | 0},${(b * 255) | 0},${pen.opacity})`;
        const bs = Math.max(1, pen.size);
        const blo = -Math.floor((bs - 1) / 2);
        const dx = Math.abs(Math.floor(x2) - Math.floor(x1));
        const dy = Math.abs(Math.floor(y2) - Math.floor(y1));
        const sx = x1 < x2 ? 1 : -1;
        const sy = y1 < y2 ? 1 : -1;
        let err = dx - dy;
        let x = Math.floor(x1),
          y = Math.floor(y1);
        const ex = Math.floor(x2),
          ey = Math.floor(y2);
        for (;;) {
          ctx.clearRect(x + blo, y + blo, bs, bs);
          ctx.fillRect(x + blo, y + blo, bs, bs);
          if (x === ex && y === ey) break;
          const e2 = 2 * err;
          if (e2 > -dy) {
            err -= dy;
            x += sx;
          }
          if (e2 < dx) {
            err += dx;
            y += sy;
          }
        }
      }

      function eraseAt(cx, cy) {
        const ctx = hrc.sceneCtx;
        if (!ctx) return;
        const r = Math.max(1, pen.size);
        ctx.clearRect(Math.floor(cx) - r, Math.floor(cy) - r, r * 2, r * 2);
      }

      // ── Controls ──

      const probeSizes = [16, 32, 64, 128, 256, 512, 1024, 2048];
      const exposureSlider = $('exposure-slider'),
        exposureValue = $('exposure-value');
      const probeSlider = $('probe-slider'),
        probeValue = $('probe-value');

      exposureSlider.addEventListener('input', () => {
        const v = Math.max(0.1, Math.min(10, Number(exposureSlider.value)));
        hrc.exposure = v;
        exposureValue.textContent = v.toFixed(1);
      });
      probeSlider.addEventListener('input', () => {
        const idx = Math.max(0, Math.min(Number(probeSlider.value), probeSizes.length - 1));
        hrc.probeCount = probeSizes[idx];
        probeValue.textContent = probeSizes[idx];
      });

      $('fc-toggle').addEventListener('change', (e) => {
        hrc.falseColor = e.target.checked;
      });

      $('load-btn').addEventListener('click', () => $('scene-file').click());
      $('save-btn').addEventListener('click', () => {
        const c = hrc.sceneCanvas;
        if (!c) return;
        const a = document.createElement('a');
        a.href = c.toDataURL('image/png');
        a.download = `scene-${Date.now()}.png`;
        a.click();
      });
      $('scene-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
          if (img.width !== img.height) {
            console.warn('Scene must be square');
            return;
          }
          hrc.probeCount = img.width;
          const idx = probeSizes.indexOf(img.width);
          if (idx >= 0) {
            probeSlider.value = idx;
            probeValue.textContent = img.width;
          }
          requestAnimationFrame(() => {
            const ctx = hrc.sceneCtx;
            if (ctx) ctx.drawImage(img, 0, 0);
          });
        };
        img.src = URL.createObjectURL(file);
        e.target.value = '';
      });

      hrc.mouseLightRadius = pen.size / 2;
      syncMouse();
      syncPanel();

      // ── FPS ──

      const fpsEl = $('fps');
      let avgFps = 0,
        lastUpdate = 0;
      (function tick(now) {
        const fps = hrc.fps;
        if (fps > 0) avgFps += (fps - avgFps) * 0.05;
        if (now - lastUpdate > 250) {
          lastUpdate = now;
          fpsEl.textContent = `${Math.round(avgFps)} fps`;
        }
        requestAnimationFrame(tick);
      })(0);

      // ── Mouse tracking ──

      document.addEventListener('mousemove', (e) => {
        const [mx, my] = hrc.mapToCanvas(e.clientX, e.clientY);
        hrc.mouseX = mx;
        hrc.mouseY = my;
      });

      // ── Keyboard ──

      document.addEventListener('keydown', (e) => {
        if (e.target.matches('input[type=text], input[type=number], textarea')) return;
        const d = e.code.match(/^Digit(\d)$/);
        if (d) {
          e.preventDefault();
          pickPreset(+d[1]);
          return;
        }
        let handled = true;
        switch (e.key) {
          case '=':
          case '+':
            pen.size = Math.min(50, pen.size + 2);
            sSize.value = pen.size;
            vSize.textContent = String(pen.size);
            hrc.mouseLightRadius = pen.size / 2;
            break;
          case '-':
          case '_':
            pen.size = Math.max(1, pen.size - 2);
            sSize.value = pen.size;
            vSize.textContent = String(pen.size);
            hrc.mouseLightRadius = pen.size / 2;
            break;
          case 'c':
          case 'C': {
            const ctx = hrc.sceneCtx;
            if (ctx) ctx.clearRect(0, 0, hrc.size, hrc.size);
            break;
          }
          default:
            handled = false;
        }
        if (handled) e.preventDefault();
      });

      // ── Drawing ──

      let drawing = false,
        lastX = 0,
        lastY = 0;
      document.addEventListener('pointerdown', (e) => {
        if (e.target.closest('#panel') || e.target.closest('#bar')) return;
        const rect = hrc.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
        drawing = true;
        [lastX, lastY] = hrc.mapToCanvas(e.clientX, e.clientY);
        e.preventDefault();
      });
      document.addEventListener('pointermove', (e) => {
        if (!drawing || e.buttons === 0) {
          drawing = false;
          return;
        }
        const [cx, cy] = hrc.mapToCanvas(e.clientX, e.clientY);
        const dx = cx - lastX,
          dy = cy - lastY;
        if (dx * dx + dy * dy >= hrc.scaleToCanvas(4) ** 2) {
          if (pen.eraser) eraseAt(cx, cy);
          else drawLine(lastX, lastY, cx, cy);
          lastX = cx;
          lastY = cy;
        }
      });
      document.addEventListener('pointerup', (e) => {
        if (!drawing) return;
        const [cx, cy] = hrc.mapToCanvas(e.clientX, e.clientY);
        if (pen.eraser) eraseAt(cx, cy);
        else drawLine(lastX, lastY, cx, cy);
        drawing = false;
      });
    </script>
  </body>
</html>
