<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dual Polygonal HRC – Fixed Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
        color: #ccc;
      }
      canvas {
        image-rendering: pixelated;
        border: 1px solid #333;
        cursor: crosshair;
      }
      #info {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.7;
      }
      #legend {
        margin-top: 4px;
        font-size: 11px;
        display: flex;
        gap: 14px;
        opacity: 0.8;
      }
      #error {
        color: #f44;
        margin: 20px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="info"></div>
    <div id="legend">
      <span style="color: #e44">■ frustum even(1:3)</span>
      <span style="color: #4e4">■ frustum odd(1:2)</span>
      <span style="color: #44e">■ band even</span>
      <span style="color: #ee4">■ band odd</span>
    </div>
    <div id="error"></div>
    <script type="module">
      const SIZE = 256,
        PS = 8,
        LS0 = 8,
        DC0 = 1,
        NC = 5,
        SCALE = 2;
      const LINES = SIZE / LS0,
        PROBES = SIZE / PS;
      const MAX_DC = DC0 << (NC - 1);
      const ATLAS_W = LINES * MAX_DC * 2,
        ATLAS_H = PROBES;

      const canvas = document.getElementById('canvas');
      canvas.width = SIZE;
      canvas.height = SIZE;
      canvas.style.width = `${SIZE * SCALE}px`;
      canvas.style.height = `${SIZE * SCALE}px`;

      let mouseX = SIZE / 2,
        mouseY = SIZE / 2,
        paused = false,
        debugMode = 1,
        maxCascade = NC - 1;
      canvas.addEventListener('mousemove', (e) => {
        const r = canvas.getBoundingClientRect();
        mouseX = ((e.clientX - r.left) * SIZE) / r.width;
        mouseY = ((e.clientY - r.top) * SIZE) / r.height;
      });
      canvas.addEventListener('click', () => {
        paused = !paused;
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'd') debugMode = (debugMode + 1) % 3;
        if (e.key >= '0' && e.key <= '9') maxCascade = Math.min(parseInt(e.key), NC - 1);
      });

      const commonWGSL = `
const SIZE=${SIZE}u;const PS=${PS}u;const LS0=${LS0}u;const DC0=${DC0}u;const NC=${NC}u;
const LINES=${LINES}u;const PROBES=${PROBES}u;
const ATL_W=${ATLAS_W}u;const ATL_H=${ATLAS_H}u;const ATL_SZ=${ATLAS_W * ATLAS_H}u;

struct Params{sx:f32,sy:f32,ci:u32,dbg:u32}

fn probeFunc(pos:vec2f,li:i32,pi:i32,di:i32,is_f:bool,ls:u32)->f32{
  let ps=f32(PS);let lsf=f32(ls);let pf=f32(pi);let df=f32(di);
  let lx=f32(li)*lsf;
  let ly=vec2f(pf,pf+1.0)*ps;
  let ext=(li&1)==0;
  let stride=select(1,2,ext);
  let sf=f32(stride);
  let rx=f32(li+stride)*lsf;
  var wmax:f32;
  if(is_f){wmax=select(2.0,3.0,ext);}else{wmax=1.0;}
  let ry=vec2f(pf+df*sf,pf+df*sf+wmax)*ps;
  if(pos.x>=lx&&pos.x<rx){
    let t=(pos.x-lx)/(rx-lx);
    let yr=mix(ly,ry,vec2f(t));
    if(pos.y>=yr.x&&pos.y<yr.y){return t;}
  }
  return -1.0;
}

fn atlasIdx(li:i32,pi:i32,di:i32,is_f:bool,dc:u32)->i32{
  let x=li*i32(dc*2u)+select(i32(dc),0,is_f)+di;
  let y=pi;
  if(x<0||x>=i32(ATL_W)||y<0||y>=i32(ATL_H)){return -1;}
  return y*i32(ATL_W)+x;
}

fn falloffRange(n:u32)->vec2f{
  return vec2f(1.0)/vec2f(f32(1u<<n),f32(1u<<(n+1u)));
}

fn dbgCol(li:i32,is_f:bool,di:i32,n:u32)->vec3f{
  let ext=(li&1)==0;
  var col:vec3f;
  if(is_f&&ext){col=vec3f(0.9,0.2,0.15);}
  else if(is_f&&!ext){col=vec3f(0.15,0.8,0.15);}
  else if(!is_f&&ext){col=vec3f(0.2,0.2,0.9);}
  else{col=vec3f(0.85,0.85,0.15);}
  if((di&1)==1){col*=0.6;}
  return col;
}
`;

      const seedWGSL =
        commonWGSL +
        `
@group(0)@binding(0) var<storage,read_write> cas:array<vec4f>;
@group(0)@binding(1) var<uniform> par:Params;
@compute @workgroup_size(16,16)
fn main(@builtin(global_invocation_id) gid:vec3u){
  let tx=i32(gid.x);let ty=i32(gid.y);
  if(tx>=i32(ATL_W)||ty>=i32(ATL_H)){return;}
  let dc=DC0;
  let li=tx/i32(dc*2u);let rem=tx%i32(dc*2u);
  let is_f=rem<i32(dc);let di=rem%i32(dc);let pi=ty;
  let src=vec2f(par.sx,par.sy);
  let sl=i32(floor(src.x/f32(LS0)));
  let sp=i32(floor(src.y/f32(PS)));
  let idx=ty*i32(ATL_W)+tx;
  if(li==sl&&pi==sp&&di==0&&is_f){
    if(par.dbg>0u){cas[idx]=vec4f(dbgCol(li,true,0,0u),0.0);}
    else{cas[idx]=vec4f(1.0);}
  }else{cas[idx]=vec4f(0.0);}
}
`;

      const extendWGSL =
        commonWGSL +
        `
@group(0)@binding(0) var<storage,read> src:array<vec4f>;
@group(0)@binding(1) var<storage,read_write> dst:array<vec4f>;
@group(0)@binding(2) var<uniform> par:Params;

fn readSrc(li:i32,pi:i32,di:i32,is_f:bool,dc:u32)->vec4f{
  let i=atlasIdx(li,pi,di,is_f,dc);
  if(i<0||i>=i32(ATL_SZ)){return vec4f(0.0);}
  return src[i];
}

@compute @workgroup_size(16,16)
fn main(@builtin(global_invocation_id) gid:vec3u){
  let tx=i32(gid.x);let ty=i32(gid.y);
  if(tx>=i32(ATL_W)||ty>=i32(ATL_H)){return;}
  let dn=par.ci;
  let ddc=DC0<<dn;let sdc=DC0<<(dn-1u);
  let li=tx/i32(ddc*2u);let rem=tx%i32(ddc*2u);
  let is_f=rem<i32(ddc);let di=rem%i32(ddc);let pi=ty;
  var res=vec4f(0.0);

  if(is_f){
    {let sl=li*2-2;let sd=di/2;
      if((di&1)==0){res+=readSrc(sl,pi-di,sd,true,sdc);}
      else{res+=readSrc(sl,pi-(di+1),sd,true,sdc);}}
    {let sl=li*2-1;let sd=di/2;
      if((di&1)==0){res+=readSrc(sl,pi-sd,sd,true,sdc);}
      else{res+=readSrc(sl,pi-sd-1,sd,true,sdc);}}
  }else{
    {let sl=li*2-2;let sd=di/2;
      if((di&1)==1){res+=readSrc(sl,pi-di,sd,true,sdc);}
      else{res+=readSrc(sl,pi-di,sd,false,sdc);}}
    if((di&1)==0){let sl=li*2-1;let sd=di/2;
      res+=readSrc(sl,pi-sd,sd,false,sdc);}
  }

  let idx=ty*i32(ATL_W)+tx;
  if(par.dbg>0u&&any(res.rgb>vec3f(0.0))){
    dst[idx]=vec4f(dbgCol(li,is_f,di,dn),0.0);
  }else{dst[idx]=res;}
}
`;

      const gatherWGSL =
        commonWGSL +
        `
@group(0)@binding(0) var<storage,read> c0:array<vec4f>;
@group(0)@binding(1) var<storage,read> c1:array<vec4f>;
@group(0)@binding(2) var<storage,read> c2:array<vec4f>;
@group(0)@binding(3) var<storage,read> c3:array<vec4f>;
@group(0)@binding(4) var<storage,read> c4:array<vec4f>;
@group(0)@binding(5) var<storage,read_write> flu:array<vec4f>;
@group(0)@binding(6) var<uniform> gpar:Params;

fn readC(n:u32,i:i32)->vec4f{
  if(i<0||i>=i32(ATL_SZ)){return vec4f(0.0);}
  switch(n){case 0u:{return c0[i];}case 1u:{return c1[i];}case 2u:{return c2[i];}case 3u:{return c3[i];}case 4u:{return c4[i];}default:{return vec4f(0.0);}}
}

@compute @workgroup_size(16,16)
fn main(@builtin(global_invocation_id) gid:vec3u){
  let px=i32(gid.x);let py=i32(gid.y);
  if(px>=i32(SIZE)||py>=i32(SIZE)){return;}
  let pos=vec2f(f32(px)+0.5,f32(py)+0.5);
  var tot=vec4f(0.0);
  let nEnd=gpar.ci+1u;
  for(var n=0u;n<nEnd;n++){
    let ls=LS0<<n;let dc=DC0<<n;let fo=falloffRange(n);
    let bli=px/i32(ls);
    for(var lp=0u;lp<2u;lp++){
      var cl=bli;
      if(lp==1u){if((bli&1)==0){continue;}cl=bli-1;}
      for(var pi=0;pi<i32(PROBES);pi++){
        for(var di=0;di<i32(dc);di++){
          {let pf=probeFunc(pos,cl,pi,di,true,ls);
            if(pf>=0.0){let ai=atlasIdx(cl,pi,di,true,dc);tot+=readC(n,ai)*mix(fo.x,fo.y,pf);}}
          {let pf=probeFunc(pos,cl,pi,di,false,ls);
            if(pf>=0.0){let ai=atlasIdx(cl,pi,di,false,dc);tot+=readC(n,ai)*mix(fo.x,fo.y,pf);}}
        }
      }
    }
  }
  flu[py*i32(SIZE)+px]=tot;
}
`;

      const blitWGSL = `
const SIZE=${SIZE}u;const PS=${PS}u;
@group(0)@binding(0) var<storage,read> flu:array<vec4f>;
@group(0)@binding(1) var<uniform> bp:vec4f;
@vertex fn vs(@builtin(vertex_index) i:u32)->@builtin(position) vec4f{
  let p=array(vec2f(-1,-1),vec2f(3,-1),vec2f(-1,3));return vec4f(p[i],0,1);}
@fragment fn fs(@builtin(position) pos:vec4f)->@location(0) vec4f{
  let px=i32(pos.x);let py=i32(pos.y);
  if(px>=i32(SIZE)||py>=i32(SIZE)){return vec4f(0,0,0,1);}
  let f=flu[py*i32(SIZE)+px];
  let checker=0.03+0.015*f32(((px/i32(PS))+(py/i32(PS)))&1);
  let bg=vec3f(checker);
  let exposure=bp.x;let debug=bp.y;
  let mc=vec2i(i32(bp.z)/i32(PS),i32(bp.w)/i32(PS));
  let pc=vec2i(px/i32(PS),py/i32(PS));
  let isMC=all(mc==pc);
  let loc=vec2i(px%i32(PS),py%i32(PS));
  let onB=loc.x==0||loc.y==0||loc.x==i32(PS)-1||loc.y==i32(PS)-1;
  let hdr=f.rgb*exposure;
  var mapped:vec3f;
  if(debug>0.5){mapped=hdr;}else{mapped=hdr/(hdr+vec3f(1.0));}
  var result=max(bg,pow(mapped,vec3f(1.0/2.2)));
  if(isMC&&onB){result=mix(result,vec3f(0.0,1.0,0.9),0.85);}
  return vec4f(result,1.0);
}
`;

      async function main() {
        if (!navigator.gpu) {
          document.getElementById('error').textContent = 'WebGPU not supported';
          return;
        }
        const ad = await navigator.gpu.requestAdapter();
        if (!ad) {
          document.getElementById('error').textContent = 'No adapter';
          return;
        }
        const dev = await ad.requestDevice();
        const ctx = canvas.getContext('webgpu');
        const fmt = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device: dev, format: fmt, alphaMode: 'premultiplied' });

        const S = GPUBufferUsage.STORAGE,
          U = GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
          D = GPUBufferUsage.COPY_DST;
        const AB = ATLAS_W * ATLAS_H * 16;

        const cB = Array.from({ length: NC }, (_, i) => dev.createBuffer({ label: `c${i}`, size: AB, usage: S | D }));
        const fB = dev.createBuffer({ label: 'flu', size: SIZE * SIZE * 16, usage: S | D });
        const bpB = dev.createBuffer({ label: 'bp', size: 16, usage: U });
        const pB = Array.from({ length: NC }, (_, i) => {
          const b = dev.createBuffer({ label: `p${i}`, size: 16, usage: U });
          const d = new ArrayBuffer(16);
          new DataView(d).setUint32(8, i, true);
          dev.queue.writeBuffer(b, 0, d);
          return b;
        });
        const gparB = dev.createBuffer({ label: 'gpar', size: 16, usage: U });

        function comp(code, label) {
          return dev.createComputePipeline({
            label,
            layout: 'auto',
            compute: { module: dev.createShaderModule({ code }), entryPoint: 'main' },
          });
        }

        const seedP = comp(seedWGSL, 'seed'),
          extP = comp(extendWGSL, 'extend'),
          gatP = comp(gatherWGSL, 'gather');
        const bm = dev.createShaderModule({ code: blitWGSL });
        const blitP = dev.createRenderPipeline({
          label: 'blit',
          layout: 'auto',
          vertex: { module: bm, entryPoint: 'vs' },
          fragment: { module: bm, entryPoint: 'fs', targets: [{ format: fmt }] },
          primitive: { topology: 'triangle-list' },
        });

        function bg(pipe, entries) {
          return dev.createBindGroup({
            layout: pipe.getBindGroupLayout(0),
            entries: entries.map((resource, binding) => ({ binding, resource })),
          });
        }

        const seedBG = bg(seedP, [{ buffer: cB[0] }, { buffer: pB[0] }]);
        const extBG = [];
        for (let n = 0; n < NC - 1; n++)
          extBG.push(bg(extP, [{ buffer: cB[n] }, { buffer: cB[n + 1] }, { buffer: pB[n + 1] }]));
        const gatBG = bg(gatP, [
          { buffer: cB[0] },
          { buffer: cB[1] },
          { buffer: cB[2] },
          { buffer: cB[3] },
          { buffer: cB[4] },
          { buffer: fB },
          { buffer: gparB },
        ]);
        const blitBG = bg(blitP, [{ buffer: fB }, { buffer: bpB }]);

        const WA = Math.ceil(ATLAS_W / 16),
          WAH = Math.ceil(ATLAS_H / 16),
          WS = Math.ceil(SIZE / 16);
        const sd = new Float32Array(2);

        function frame() {
          if (!paused) {
            sd[0] = mouseX;
            sd[1] = mouseY;
            for (let i = 0; i < NC; i++) {
              dev.queue.writeBuffer(pB[i], 0, sd);
              dev.queue.writeBuffer(pB[i], 12, new Uint32Array([debugMode]));
            }
            dev.queue.writeBuffer(bpB, 0, new Float32Array([debugMode > 0 ? 1 : 5, debugMode, mouseX, mouseY]));
            {
              const d = new ArrayBuffer(16);
              const v = new DataView(d);
              v.setFloat32(0, mouseX, true);
              v.setFloat32(4, mouseY, true);
              v.setUint32(8, maxCascade, true);
              v.setUint32(12, debugMode, true);
              dev.queue.writeBuffer(gparB, 0, d);
            }

            const e = dev.createCommandEncoder();
            for (const b of cB) e.clearBuffer(b);
            e.clearBuffer(fB);
            {
              const p = e.beginComputePass();
              p.setPipeline(seedP);
              p.setBindGroup(0, seedBG);
              p.dispatchWorkgroups(WA, WAH);
              p.end();
            }
            if (debugMode < 2)
              for (let n = 0; n < Math.min(NC - 1, maxCascade); n++) {
                const p = e.beginComputePass();
                p.setPipeline(extP);
                p.setBindGroup(0, extBG[n]);
                p.dispatchWorkgroups(WA, WAH);
                p.end();
              }
            {
              const p = e.beginComputePass();
              p.setPipeline(gatP);
              p.setBindGroup(0, gatBG);
              p.dispatchWorkgroups(WS, WS);
              p.end();
            }
            {
              const p = e.beginRenderPass({
                colorAttachments: [
                  {
                    view: ctx.getCurrentTexture().createView(),
                    clearValue: { r: 0, g: 0, b: 0, a: 1 },
                    loadOp: 'clear',
                    storeOp: 'store',
                  },
                ],
              });
              p.setPipeline(blitP);
              p.setBindGroup(0, blitBG);
              p.draw(3);
              p.end();
            }
            dev.queue.submit([e.finish()]);
          }
          document.getElementById('info').textContent =
            `D=debug(${debugMode}) 0-4=cascade(${maxCascade}) | Fixed grid, PS=${PS}, LS0=${LS0}, atlas=${ATLAS_W}x${ATLAS_H}`;
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }
      main().catch((e) => {
        document.getElementById('error').textContent = e.message + '\n' + e.stack;
      });
    </script>
  </body>
</html>
