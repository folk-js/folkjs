<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dual Polygonal HRC – Fixed Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: monospace;
        color: #ccc;
      }
      canvas {
        image-rendering: pixelated;
        border: 1px solid #333;
        cursor: crosshair;
      }
      #info {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.7;
      }
      #legend {
        margin-top: 4px;
        font-size: 11px;
        display: flex;
        gap: 14px;
        opacity: 0.8;
      }
      #cascade-grid {
        margin-top: 2px;
        font-family: monospace;
        font-size: 9px;
      }
      .cascade-row {
        display: flex;
        align-items: center;
        position: relative;
      }
      .cascade-label {
        position: absolute;
        left: -28px;
        text-align: right;
        width: 24px;
        color: #888;
      }
      .cascade-cell {
        height: 10px;
        border: 1px solid rgba(0, 0, 0, 0.5);
        opacity: 0.7;
      }
      #error {
        color: #f44;
        margin: 20px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="cascade-grid"></div>
    <div id="info"></div>
    <div id="legend"></div>
    <div id="error"></div>
    <script type="module">
      const WORLD_SIZE = 256,
        PROBE_SPACING = 8,
        LINE_SPACING = 8,
        NUM_CASCADES = 6,
        DISPLAY_SCALE = 2,
        SLOTS_PER_DIR = 4;
      const NUM_LINES = WORLD_SIZE / LINE_SPACING,
        NUM_PROBES = WORLD_SIZE / PROBE_SPACING;
      const MAX_DIR_COUNT = 1 << (NUM_CASCADES - 1);
      const MAX_FULL_DIR_COUNT = 2 * MAX_DIR_COUNT;
      const ATLAS_W = NUM_LINES * MAX_FULL_DIR_COUNT * SLOTS_PER_DIR,
        ATLAS_H = NUM_PROBES;

      const canvas = document.getElementById('canvas');
      canvas.width = WORLD_SIZE;
      canvas.height = WORLD_SIZE;
      canvas.style.width = `${WORLD_SIZE * DISPLAY_SCALE}px`;
      canvas.style.height = `${WORLD_SIZE * DISPLAY_SCALE}px`;

      const CASCADE_COLORS = ['#e63926', '#19cc26', '#264de6', '#e6bf19', '#cc26e6', '#26c4c4'];
      {
        const grid = document.getElementById('cascade-grid');
        for (let n = 0; n < NUM_CASCADES; n++) {
          const row = document.createElement('div');
          row.className = 'cascade-row';
          const label = document.createElement('span');
          label.className = 'cascade-label';
          label.textContent = `C${n}`;
          label.style.color = CASCADE_COLORS[n];
          row.appendChild(label);
          const ls = LINE_SPACING << n;
          const cellCount = WORLD_SIZE / ls;
          const cellPx = ls * DISPLAY_SCALE;
          for (let i = 0; i < cellCount; i++) {
            const cell = document.createElement('span');
            cell.className = 'cascade-cell';
            cell.style.width = cellPx + 'px';
            cell.style.background = CASCADE_COLORS[n];
            row.appendChild(cell);
          }
          grid.appendChild(row);
        }
      }

      let mouseX = WORLD_SIZE / 2,
        mouseY = WORLD_SIZE / 2,
        paused = false,
        debugMode = 1,
        maxCascade = NUM_CASCADES - 1;
      canvas.addEventListener('mousemove', (e) => {
        const r = canvas.getBoundingClientRect();
        mouseX = ((e.clientX - r.left) * WORLD_SIZE) / r.width;
        mouseY = ((e.clientY - r.top) * WORLD_SIZE) / r.height;
      });
      canvas.addEventListener('click', () => {
        paused = !paused;
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'd') debugMode = (debugMode + 1) % 4;
        if (e.key >= '0' && e.key <= '9') maxCascade = Math.min(parseInt(e.key), NUM_CASCADES - 1);
      });

      // ================================================================
      // TESSELLATION — 0:1 + 1:1 unit shapes, 90-degree cone
      //
      // fullDirCount = 2 * dirCount = 2^(n+1) per cascade.
      // offset = fullDirIdx - dirCount.
      //   offset >= 0 : downward.  D = offset.
      //   offset <  0 : upward.    D = -offset - 1.  Mirror around P+0.5.
      //
      // Two center directions share the same 1:1 at D=0:
      //   center_down (offset= 0): triangles expand downward.
      //   center_up   (offset=-1): triangles expand upward via mirror.
      // The overlap at the shared 1:1 is intentional — both carry
      // independent angular data and must be addressable separately.
      //
      // Extend: srcFullDir = fullDirIdx / 2 (clean integer division).
      //
      // Shape layout per (line, probe, fullDir):
      //   Even line: [1:1, 0:1, 0:1, 1:1]  (slots 0-2 = frustum, 3 = band)
      //   Odd line:  [1:1, 0:1, 1:1, ---]  (slots 0-1 = frustum, 2 = band)
      // ================================================================
      const tessellationWGSL = `
const SLOTS_PER_DIR = ${SLOTS_PER_DIR}u;

fn slotShapeTest(pos: vec2f, lineIdx: i32, probeIdx: i32, fullDirIdx: i32,
                 slotIdx: i32, lineSpacing: u32, dirCount: u32) -> f32 {
  let ps = f32(PROBE_SPACING);
  let ls = f32(lineSpacing);
  let P = f32(probeIdx);
  let offset = fullDirIdx - i32(dirCount);
  let D = f32(select(offset, -offset - 1, offset < 0));
  let isEven = (lineIdx & 1) == 0;
  let stride = select(1, 2, isEven);

  let leftX = f32(lineIdx) * ls + f32(LINE_SPACING);
  let rightX = f32(lineIdx + stride) * ls + f32(LINE_SPACING);
  if (pos.x < leftX || pos.x >= rightX) { return -1.0; }
  let t = (pos.x - leftX) / (rightX - leftX);

  var lY: vec2f;
  var rY: vec2f;

  if (isEven) {
    let base = P + D * 2.0;
    if (slotIdx == 0) {
      lY = vec2f(P, P + 1.0);
      rY = vec2f(base, base + 1.0);
    } else if (slotIdx == 1) {
      lY = vec2f(P + 1.0, P + 1.0);
      rY = vec2f(base + 1.0, base + 2.0);
    } else if (slotIdx == 2) {
      lY = vec2f(P + 1.0, P + 1.0);
      rY = vec2f(base + 2.0, base + 3.0);
    } else if (slotIdx == 3) {
      lY = vec2f(P, P + 1.0);
      rY = vec2f(base, base + 1.0);
    } else { return -1.0; }
  } else {
    let base = P + D;
    if (slotIdx == 0) {
      lY = vec2f(P, P + 1.0);
      rY = vec2f(base, base + 1.0);
    } else if (slotIdx == 1) {
      lY = vec2f(P + 1.0, P + 1.0);
      rY = vec2f(base + 1.0, base + 2.0);
    } else if (slotIdx == 2) {
      lY = vec2f(P, P + 1.0);
      rY = vec2f(base, base + 1.0);
    } else { return -1.0; }
  }

  if (offset < 0) {
    let c = 2.0 * P + 1.0;
    lY = vec2f(c - lY.y, c - lY.x);
    rY = vec2f(c - rY.y, c - rY.x);
  }

  let leftY = lY * ps;
  let rightY = rY * ps;
  let yRange = mix(leftY, rightY, vec2f(t));
  if (yRange.x >= yRange.y) { return -1.0; }
  if (pos.y >= yRange.x && pos.y < yRange.y) { return t; }
  return -1.0;
}

fn slotAtlasIndex(lineIdx: i32, probeIdx: i32, fullDirIdx: i32,
                  slotIdx: i32, fullDirCount: u32) -> i32 {
  let x = lineIdx * i32(fullDirCount * SLOTS_PER_DIR) + fullDirIdx * i32(SLOTS_PER_DIR) + slotIdx;
  let y = probeIdx;
  if (x < 0 || x >= i32(ATLAS_W) || y < 0 || y >= i32(ATLAS_H)) { return -1; }
  return y * i32(ATLAS_W) + x;
}

fn isTriangleSlot(isEven: bool, slotIdx: i32) -> bool {
  if (isEven) { return slotIdx == 1 || slotIdx == 2; }
  return slotIdx == 1;
}

fn falloffRange(n: u32) -> vec2f {
  return vec2f(1.0) / vec2f(f32(1u << n), f32(1u << (n + 1u)));
}

fn cascadeColor(n: u32) -> vec3f {
  switch (n) {
    case 0u: { return vec3f(0.9, 0.15, 0.1); }
    case 1u: { return vec3f(0.1, 0.8, 0.15); }
    case 2u: { return vec3f(0.15, 0.3, 0.9); }
    case 3u: { return vec3f(0.9, 0.75, 0.1); }
    case 4u: { return vec3f(0.8, 0.15, 0.9); }
    case 5u: { return vec3f(0.15, 0.75, 0.75); }
    default: { return vec3f(0.5); }
  }
}
`;

      const commonWGSL = `
const WORLD_SIZE = ${WORLD_SIZE}u;
const PROBE_SPACING = ${PROBE_SPACING}u;
const LINE_SPACING = ${LINE_SPACING}u;
const NUM_CASCADES = ${NUM_CASCADES}u;
const NUM_LINES = ${NUM_LINES}u;
const NUM_PROBES = ${NUM_PROBES}u;
const ATLAS_W = ${ATLAS_W}u;
const ATLAS_H = ${ATLAS_H}u;
const ATLAS_SIZE = ${ATLAS_W * ATLAS_H}u;

struct Params { sourceX: f32, sourceY: f32, cascadeIdx: u32, debug: u32 }

${tessellationWGSL}
`;

      const seedWGSL =
        commonWGSL +
        `
@group(0) @binding(0) var<storage, read_write> cascade: array<vec4f>;
@group(0) @binding(1) var<uniform> params: Params;

@compute @workgroup_size(16, 16)
fn main(@builtin(global_invocation_id) gid: vec3u) {
  let tx = i32(gid.x); let ty = i32(gid.y);
  if (tx >= i32(ATLAS_W) || ty >= i32(ATLAS_H)) { return; }

  let fullDirCount = 2u;
  let slotsPerLine = i32(fullDirCount * SLOTS_PER_DIR);
  let lineIdx = tx / slotsPerLine;
  let rem = tx % slotsPerLine;
  let fullDirIdx = rem / i32(SLOTS_PER_DIR);
  let slotIdx = rem % i32(SLOTS_PER_DIR);
  let probeIdx = ty;

  let source = vec2f(params.sourceX, params.sourceY);
  let srcLine = i32(floor(source.x / f32(LINE_SPACING)));
  let srcProbe = i32(floor(source.y / f32(PROBE_SPACING)));

  let idx = ty * i32(ATLAS_W) + tx;
  if (lineIdx == srcLine && probeIdx == srcProbe) {
    if (params.debug == 3u) { cascade[idx] = vec4f(cascadeColor(0u), 0.0); }
    else                    { cascade[idx] = vec4f(1.0); }
  } else {
    cascade[idx] = vec4f(0.0);
  }
}
`;

      const extendWGSL =
        commonWGSL +
        `
@group(0) @binding(0) var<storage, read> src: array<vec4f>;
@group(0) @binding(1) var<storage, read_write> dst: array<vec4f>;
@group(0) @binding(2) var<uniform> params: Params;

fn readSlot(lineIdx: i32, probeIdx: i32, fullDirIdx: i32,
            slotIdx: i32, fullDirCount: u32) -> vec4f {
  let i = slotAtlasIndex(lineIdx, probeIdx, fullDirIdx, slotIdx, fullDirCount);
  if (i < 0 || i >= i32(ATLAS_SIZE)) { return vec4f(0.0); }
  return src[i];
}

@compute @workgroup_size(16, 16)
fn main(@builtin(global_invocation_id) gid: vec3u) {
  let tx = i32(gid.x); let ty = i32(gid.y);
  if (tx >= i32(ATLAS_W) || ty >= i32(ATLAS_H)) { return; }

  let cascadeN = params.cascadeIdx;
  let dstDirCount = 1u << cascadeN;
  let srcDirCount = 1u << (cascadeN - 1u);
  let dstFullDirCount = 2u * dstDirCount;
  let srcFullDirCount = 2u * srcDirCount;

  let slotsPerLine = i32(dstFullDirCount * SLOTS_PER_DIR);
  let lineIdx = tx / slotsPerLine;
  let rem = tx % slotsPerLine;
  let fullDirIdx = rem / i32(SLOTS_PER_DIR);
  let slotIdx = rem % i32(SLOTS_PER_DIR);
  let probeIdx = ty;

  let isEven = (lineIdx & 1) == 0;
  let numFrustumSlots = select(2, 3, isEven);
  let bandSlot = select(2, 3, isEven);

  let offset = fullDirIdx - i32(dstDirCount);
  let isUp = offset < 0;
  let pSign = select(-1, 1, isUp);
  let D = select(offset, -offset - 1, isUp);

  let srcFullDir = fullDirIdx / 2;
  let srcOffset = srcFullDir - i32(srcDirCount);
  let srcD = select(srcOffset, -srcOffset - 1, srcOffset < 0);

  let isInner = ((fullDirIdx & 1) == 0) != isUp;

  var result = vec4f(0.0);

  if (slotIdx < numFrustumSlots) {
    {
      let srcLine = lineIdx * 2 - 2;
      let probeOff = select(2 * (srcD + 1), 2 * srcD, isInner);
      result += readSlot(srcLine, probeIdx + pSign * probeOff, srcFullDir, 0, srcFullDirCount);
    }
    {
      let srcLine = lineIdx * 2 - 1;
      let probeOff = select(srcD + 1, srcD, isInner);
      result += readSlot(srcLine, probeIdx + pSign * probeOff, srcFullDir, 0, srcFullDirCount);
    }
  } else if (slotIdx == bandSlot) {
    {
      let srcLine = lineIdx * 2 - 2;
      if ((D & 1) == 1) {
        result += readSlot(srcLine, probeIdx + pSign * D, srcFullDir, 0, srcFullDirCount);
      } else {
        result += readSlot(srcLine, probeIdx + pSign * D, srcFullDir, 3, srcFullDirCount);
      }
    }
    if ((D & 1) == 0) {
      let srcLine = lineIdx * 2 - 1;
      result += readSlot(srcLine, probeIdx + pSign * srcD, srcFullDir, 2, srcFullDirCount);
    }
  }

  let idx = ty * i32(ATLAS_W) + tx;
  if (params.debug == 3u && any(result.rgb > vec3f(0.0))) {
    dst[idx] = vec4f(cascadeColor(cascadeN), 0.0);
  } else if (params.debug > 0u && any(result.rgb > vec3f(0.0))) {
    dst[idx] = vec4f(1.0);
  } else {
    dst[idx] = result;
  }
}
`;

      const gatherWGSL =
        commonWGSL +
        `
@group(0) @binding(0) var<storage, read> c0: array<vec4f>;
@group(0) @binding(1) var<storage, read> c1: array<vec4f>;
@group(0) @binding(2) var<storage, read> c2: array<vec4f>;
@group(0) @binding(3) var<storage, read> c3: array<vec4f>;
@group(0) @binding(4) var<storage, read> c4: array<vec4f>;
@group(0) @binding(5) var<storage, read> c5: array<vec4f>;
@group(0) @binding(6) var<storage, read_write> fluence: array<vec4f>;
@group(0) @binding(7) var<uniform> gatherParams: Params;

fn readCascade(n: u32, i: i32) -> vec4f {
  if (i < 0 || i >= i32(ATLAS_SIZE)) { return vec4f(0.0); }
  switch (n) {
    case 0u: { return c0[i]; }
    case 1u: { return c1[i]; }
    case 2u: { return c2[i]; }
    case 3u: { return c3[i]; }
    case 4u: { return c4[i]; }
    case 5u: { return c5[i]; }
    default: { return vec4f(0.0); }
  }
}

@compute @workgroup_size(16, 16)
fn main(@builtin(global_invocation_id) gid: vec3u) {
  let px = i32(gid.x); let py = i32(gid.y);
  if (px >= i32(WORLD_SIZE) || py >= i32(WORLD_SIZE)) { return; }

  let pos = vec2f(f32(px) + 0.5, f32(py) + 0.5);
  var total = vec4f(0.0);
  let cascadeEnd = gatherParams.cascadeIdx + 1u;
  let showUnitShapes = gatherParams.debug == 1u;

  // C0: single 0:1 triangle from source probe center to probe right edge
  {
    let ls0 = f32(LINE_SPACING);
    let ps = f32(PROBE_SPACING);
    let srcLine = i32(floor(gatherParams.sourceX / ls0));
    let srcProbe = i32(floor(gatherParams.sourceY / ps));
    let c0Left = (f32(srcLine) + 0.5) * ls0;
    let c0Right = f32(srcLine + 1) * ls0;
    if (pos.x >= c0Left && pos.x < c0Right) {
      let t = (pos.x - c0Left) / (c0Right - c0Left);
      let centerY = (f32(srcProbe) + 0.5) * ps;
      let halfH = 0.5 * ps * t;
      if (pos.y >= centerY - halfH && pos.y < centerY + halfH) {
        let ai = slotAtlasIndex(srcLine, srcProbe, 0, 0, 2u);
        let val = readCascade(0u, ai);
        if (any(val.rgb > vec3f(0.0))) {
          if (showUnitShapes) {
            total += vec4f(0.95, 0.55, 0.1, 0.0);
          } else {
            total += val * mix(1.0, 0.5, t);
          }
        }
      }
    }
  }

  for (var n = 0u; n < cascadeEnd; n++) {
    let lineSpacing = LINE_SPACING << n;
    let dirCount = 1u << n;
    let fullDirCount = 2u * dirCount;
    let falloff = falloffRange(n);

    let baseLineIdx = (px - i32(LINE_SPACING)) / i32(lineSpacing);

    for (var linePass = 0u; linePass < 2u; linePass++) {
      var curLine = baseLineIdx;
      if (linePass == 1u) {
        if ((baseLineIdx & 1) == 0) { continue; }
        curLine = baseLineIdx - 1;
      }

      let isEven = (curLine & 1) == 0;

      for (var probeIdx = 0; probeIdx < i32(NUM_PROBES); probeIdx++) {
        for (var fdi = 0; fdi < i32(fullDirCount); fdi++) {
          for (var slotIdx = 0; slotIdx < i32(SLOTS_PER_DIR); slotIdx++) {
            let t = slotShapeTest(pos, curLine, probeIdx, fdi, slotIdx, lineSpacing, dirCount);
            if (t >= 0.0) {
              let ai = slotAtlasIndex(curLine, probeIdx, fdi, slotIdx, fullDirCount);
              let val = readCascade(n, ai);
              if (any(val.rgb > vec3f(0.0))) {
                if (showUnitShapes) {
                  let isTri = isTriangleSlot(isEven, slotIdx);
                  let col = select(vec3f(0.85, 0.15, 0.55), vec3f(0.95, 0.55, 0.1), isTri);
                  total += vec4f(col, 0.0);
                } else {
                  total += val * mix(falloff.x, falloff.y, t);
                }
              }
            }
          }
        }
      }
    }
  }

  fluence[py * i32(WORLD_SIZE) + px] = total;
}
`;

      const blitWGSL = `
const WORLD_SIZE = ${WORLD_SIZE}u;
const PROBE_SPACING = ${PROBE_SPACING}u;

@group(0) @binding(0) var<storage, read> fluence: array<vec4f>;
@group(0) @binding(1) var<uniform> blitParams: vec4f;

@vertex fn vs(@builtin(vertex_index) i: u32) -> @builtin(position) vec4f {
  let p = array(vec2f(-1, -1), vec2f(3, -1), vec2f(-1, 3));
  return vec4f(p[i], 0, 1);
}

@fragment fn fs(@builtin(position) pos: vec4f) -> @location(0) vec4f {
  let px = i32(pos.x); let py = i32(pos.y);
  if (px >= i32(WORLD_SIZE) || py >= i32(WORLD_SIZE)) { return vec4f(0, 0, 0, 1); }

  let f = fluence[py * i32(WORLD_SIZE) + px];
  let checker = 0.03 + 0.015 * f32(((px / i32(PROBE_SPACING)) + (py / i32(PROBE_SPACING))) & 1);
  let bg = vec3f(checker);

  let exposure = blitParams.x;
  let debug = blitParams.y;
  let mouseCell = vec2i(i32(blitParams.z) / i32(PROBE_SPACING), i32(blitParams.w) / i32(PROBE_SPACING));
  let pixelCell = vec2i(px / i32(PROBE_SPACING), py / i32(PROBE_SPACING));
  let isMouseCell = all(mouseCell == pixelCell);

  let localPos = vec2i(px % i32(PROBE_SPACING), py % i32(PROBE_SPACING));
  let onBorder = localPos.x == 0 || localPos.y == 0 ||
                 localPos.x == i32(PROBE_SPACING) - 1 || localPos.y == i32(PROBE_SPACING) - 1;

  let hdr = f.rgb * exposure;
  var mapped: vec3f;
  if (debug > 0.5) { mapped = hdr; } else { mapped = hdr / (hdr + vec3f(1.0)); }

  var result = max(bg, pow(mapped, vec3f(1.0 / 2.2)));
  if (isMouseCell && onBorder) { result = mix(result, vec3f(0.0, 1.0, 0.9), 0.85); }
  return vec4f(result, 1.0);
}
`;

      async function main() {
        if (!navigator.gpu) {
          document.getElementById('error').textContent = 'WebGPU not supported';
          return;
        }
        const adapter = await navigator.gpu.requestAdapter();
        if (!adapter) {
          document.getElementById('error').textContent = 'No adapter';
          return;
        }
        const device = await adapter.requestDevice();
        const ctx = canvas.getContext('webgpu');
        const format = navigator.gpu.getPreferredCanvasFormat();
        ctx.configure({ device, format, alphaMode: 'premultiplied' });

        const STORAGE = GPUBufferUsage.STORAGE,
          UNIFORM = GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST;
        const ATLAS_BYTES = ATLAS_W * ATLAS_H * 16;

        const cascadeBuffers = Array.from({ length: NUM_CASCADES }, (_, i) =>
          device.createBuffer({ label: `cascade${i}`, size: ATLAS_BYTES, usage: STORAGE | GPUBufferUsage.COPY_DST }),
        );
        const fluenceBuffer = device.createBuffer({
          label: 'fluence',
          size: WORLD_SIZE * WORLD_SIZE * 16,
          usage: STORAGE | GPUBufferUsage.COPY_DST,
        });
        const blitParamBuffer = device.createBuffer({ label: 'blitParams', size: 16, usage: UNIFORM });
        const paramBuffers = Array.from({ length: NUM_CASCADES }, (_, i) => {
          const buf = device.createBuffer({ label: `params${i}`, size: 16, usage: UNIFORM });
          const data = new ArrayBuffer(16);
          new DataView(data).setUint32(8, i, true);
          device.queue.writeBuffer(buf, 0, data);
          return buf;
        });
        const gatherParamBuffer = device.createBuffer({ label: 'gatherParams', size: 16, usage: UNIFORM });

        function createComputePipeline(code, label) {
          return device.createComputePipeline({
            label,
            layout: 'auto',
            compute: { module: device.createShaderModule({ code }), entryPoint: 'main' },
          });
        }

        const seedPipeline = createComputePipeline(seedWGSL, 'seed'),
          extendPipeline = createComputePipeline(extendWGSL, 'extend'),
          gatherPipeline = createComputePipeline(gatherWGSL, 'gather');
        const blitModule = device.createShaderModule({ code: blitWGSL });
        const blitPipeline = device.createRenderPipeline({
          label: 'blit',
          layout: 'auto',
          vertex: { module: blitModule, entryPoint: 'vs' },
          fragment: { module: blitModule, entryPoint: 'fs', targets: [{ format }] },
          primitive: { topology: 'triangle-list' },
        });

        function bindGroup(pipeline, entries) {
          return device.createBindGroup({
            layout: pipeline.getBindGroupLayout(0),
            entries: entries.map((resource, binding) => ({ binding, resource })),
          });
        }

        const seedBindGroup = bindGroup(seedPipeline, [
          { buffer: cascadeBuffers[0] },
          { buffer: paramBuffers[0] },
        ]);
        const extendBindGroups = [];
        for (let n = 0; n < NUM_CASCADES - 1; n++)
          extendBindGroups.push(
            bindGroup(extendPipeline, [
              { buffer: cascadeBuffers[n] },
              { buffer: cascadeBuffers[n + 1] },
              { buffer: paramBuffers[n + 1] },
            ]),
          );
        const gatherBindGroup = bindGroup(gatherPipeline, [
          { buffer: cascadeBuffers[0] },
          { buffer: cascadeBuffers[1] },
          { buffer: cascadeBuffers[2] },
          { buffer: cascadeBuffers[3] },
          { buffer: cascadeBuffers[4] },
          { buffer: cascadeBuffers[5] },
          { buffer: fluenceBuffer },
          { buffer: gatherParamBuffer },
        ]);
        const blitBindGroup = bindGroup(blitPipeline, [
          { buffer: fluenceBuffer },
          { buffer: blitParamBuffer },
        ]);

        const atlasWGX = Math.ceil(ATLAS_W / 16),
          atlasWGY = Math.ceil(ATLAS_H / 16),
          screenWG = Math.ceil(WORLD_SIZE / 16);
        const sourceXY = new Float32Array(2);

        function frame() {
          if (!paused) {
            sourceXY[0] = mouseX;
            sourceXY[1] = mouseY;
            for (let i = 0; i < NUM_CASCADES; i++) {
              device.queue.writeBuffer(paramBuffers[i], 0, sourceXY);
              device.queue.writeBuffer(paramBuffers[i], 12, new Uint32Array([debugMode]));
            }
            device.queue.writeBuffer(
              blitParamBuffer,
              0,
              new Float32Array([debugMode > 0 ? 1 : 5, debugMode, mouseX, mouseY]),
            );
            {
              const data = new ArrayBuffer(16);
              const view = new DataView(data);
              view.setFloat32(0, mouseX, true);
              view.setFloat32(4, mouseY, true);
              view.setUint32(8, maxCascade, true);
              view.setUint32(12, debugMode, true);
              device.queue.writeBuffer(gatherParamBuffer, 0, data);
            }

            const encoder = device.createCommandEncoder();
            for (const buf of cascadeBuffers) encoder.clearBuffer(buf);
            encoder.clearBuffer(fluenceBuffer);
            {
              const pass = encoder.beginComputePass();
              pass.setPipeline(seedPipeline);
              pass.setBindGroup(0, seedBindGroup);
              pass.dispatchWorkgroups(atlasWGX, atlasWGY);
              pass.end();
            }
            if (debugMode !== 2)
              for (let n = 0; n < Math.min(NUM_CASCADES - 1, maxCascade); n++) {
                const pass = encoder.beginComputePass();
                pass.setPipeline(extendPipeline);
                pass.setBindGroup(0, extendBindGroups[n]);
                pass.dispatchWorkgroups(atlasWGX, atlasWGY);
                pass.end();
              }
            {
              const pass = encoder.beginComputePass();
              pass.setPipeline(gatherPipeline);
              pass.setBindGroup(0, gatherBindGroup);
              pass.dispatchWorkgroups(screenWG, screenWG);
              pass.end();
            }
            {
              const pass = encoder.beginRenderPass({
                colorAttachments: [
                  {
                    view: ctx.getCurrentTexture().createView(),
                    clearValue: { r: 0, g: 0, b: 0, a: 1 },
                    loadOp: 'clear',
                    storeOp: 'store',
                  },
                ],
              });
              pass.setPipeline(blitPipeline);
              pass.setBindGroup(0, blitBindGroup);
              pass.draw(3);
              pass.end();
            }
            device.queue.submit([encoder.finish()]);
          }
          const modeNames = ['off', 'shapes', 'seed-only', 'cascades'];
          document.getElementById('info').textContent =
            `D=debug:${modeNames[debugMode]}(${debugMode}) 0-${NUM_CASCADES - 1}=cascade(${maxCascade}) | PS=${PROBE_SPACING}, LS=${LINE_SPACING}, atlas=${ATLAS_W}x${ATLAS_H}`;
          const legend = document.getElementById('legend');
          if (debugMode === 3) {
            legend.innerHTML =
              '<span style="color:#e42">■ C0</span>' +
              '<span style="color:#1c3">■ C1</span>' +
              '<span style="color:#35e">■ C2</span>' +
              '<span style="color:#ec2">■ C3</span>' +
              '<span style="color:#c3e">■ C4</span>' +
              '<span style="color:#2bb">■ C5</span>' +
              '<span style="color:#aaa"> (additive: overlap = mixed colors)</span>';
          } else {
            legend.innerHTML =
              '<span style="color:#d9268d">■ 1:1 parallelogram</span>' +
              '<span style="color:#f28c1a">■ 0:1 triangle</span>';
          }
          requestAnimationFrame(frame);
        }
        requestAnimationFrame(frame);
      }
      main().catch((e) => {
        document.getElementById('error').textContent = e.message + '\n' + e.stack;
      });
    </script>
  </body>
</html>
